<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharma's Echo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+Devanagari:wght@300;400;500&family=Jomolhari&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream: #f8f0d8;
  --cream-border: #d8c080;
  --gold: #c8a030;
  --gold-dark: #a08030;
  --amber: #b06818;
  --text: #2a2010;
  --text-mid: #4a3a18;
  --text-label: #6a5820;
  --text-faint: #c8a855;
}

body {
  background: #ffffff;
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 5rem;
}

/* ── Header ── */
.header {
  padding: 2.4rem 3rem 1.8rem;
  border-bottom: 1px solid var(--cream-border);
}
.header-name {
  font-family: sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.42em;
  font-weight: 300;
  color: var(--text);
}
.header-sub {
  font-family: sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 0.5rem;
}

/* ── Key gate ── */
.key-gate {
  padding: 0.9rem 3rem;
  border-bottom: 1px solid var(--cream-border);
  background: var(--cream);
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.key-gate.hidden { display: none; }
.key-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dark);
  white-space: nowrap;
  font-weight: 600;
}
.key-input {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--cream-border);
  padding: 0.35rem 0.5rem;
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
  background: transparent;
  min-width: 0;
}
.key-save {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
}
.key-save:hover { color: var(--text); }

/* ── Write area ── */
.write-area { padding: 3rem 3rem 0; }
textarea {
  width: 100%;
  min-height: 80px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--text);
  background: transparent;
  display: block;
}
textarea::placeholder { color: var(--text-faint); font-style: italic; font-size: 1.05rem; }
.write-hint {
  font-family: sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-top: 0.5rem;
  transition: opacity 0.3s;
}
.write-hint.hidden { opacity: 0; }

.echo-row {
  display: flex;
  justify-content: flex-end;
  padding: 1rem 3rem 2.5rem;
}
.echo-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
  transition: color 0.2s;
}
.echo-btn:hover { color: var(--text); }
.echo-btn:disabled { color: var(--text-faint); cursor: not-allowed; }

/* ── Loading ── */
.loading { display: none; padding: 2.5rem 3rem; }
.loading.visible { display: block; }
.loading-text {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── Response ── */
.response { display: none; animation: fadeIn 0.7s ease; }
.response.visible { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* You wrote */
.you-wrote {
  padding: 2.8rem 3rem 2.4rem;
  border-bottom: 1px solid var(--amber);
  margin-bottom: 2.8rem;
}
.you-wrote-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.9rem;
}
.you-wrote-text {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--gold);
  line-height: 1.9;
}

/* Response body */
.response-body { padding: 0 3rem; }

/* Opening */
.opening {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 2.4rem;
}

/* Term block */
.term-block {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--gold);
  padding: 1.8rem 2rem;
  margin-bottom: 2.4rem;
}
.term-scripts {
  display: flex;
  gap: 2rem;
  align-items: baseline;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}
.term-script {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.3;
}
.term-script-tibetan {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.3rem;
  font-weight: 300;
  color: var(--gold-dark);
  line-height: 1.4;
}
.term-roman {
  font-family: sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 1.1rem;
  font-weight: 600;
}
.term-first {
  font-size: 0.97rem;
  line-height: 1.85;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.term-body {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
}

/* Seal line */
.seal-line {
  font-family: 'Lora', Georgia, serif;
  font-size: 0.97rem;
  line-height: 1.8;
  color: var(--text-label);
  margin-bottom: 2.8rem;
  font-style: italic;
}

/* Section divider — amber line */
.section-rule {
  border: none;
  border-top: 1px solid var(--amber);
  margin: 0 0 2.4rem;
  opacity: 0.5;
}

/* Figure + Source */
.figure-source { margin-bottom: 2.4rem; }

.figure-name {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.figure-tradition {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.7rem;
}
.figure-key-work {
  font-family: sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.6rem;
}
.figure-key-work em {
  font-style: italic;
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.75rem;
}
.figure-desc {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
  margin-bottom: 1.6rem;
}
.source-title {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  color: var(--gold-dark);
  margin-bottom: 0.7rem;
}
.source-title em {
  font-style: italic;
  font-family: 'Lora', Georgia, serif;
  letter-spacing: 0.02em;
  font-size: 0.78rem;
}
.source-title .source-ref-upper {
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.62rem;
}
.source-box {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--amber);
  padding: 1.2rem 1.6rem;
}
.source-passage {
  font-size: 0.97rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.9;
  margin-bottom: 0.55rem;
}
.source-translator {
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-label);
}

/* Divider star */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2.4rem 0;
}
.divider-line { flex:1; height:1px; background: var(--amber); opacity: 0.4; }

/* Image */
.image-block {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  padding: 1.8rem;
  margin-bottom: 2.4rem;
  text-align: center;
}
.image-block img {
  max-width: 100%;
  max-height: 300px;
  object-fit: contain;
  display: block;
  margin: 0 auto 1.1rem;
}
.image-title {
  font-family: sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.45rem;
}
.image-why {
  font-size: 0.9rem;
  color: var(--text-label);
  line-height: 1.75;
}

/* Verse */
.verse-block { margin-bottom: 1rem; }
.verse-label {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 1rem;
}
.verse-text {
  font-family: 'Lora', Georgia, serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text);
  line-height: 2.1;
  margin-bottom: 0.8rem;
}
.verse-attr {
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-dark);
}

/* Again */
.again-row { padding: 2rem 3rem 0; display: none; }
.again-row.visible { display: flex; }
.again-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0;
}
.again-btn:hover { color: var(--text); }

/* Error */
.error { display: none; padding: 1rem 3rem; color: #904040; font-style: italic; font-size: 0.9rem; }
.error.visible { display: block; }
/* ── Save / Share row ── */
.save-row {
  padding: 1rem 3rem 0;
  display: none;
  justify-content: flex-start;
  gap: 0.6rem;
  flex-wrap: wrap;
  align-items: center;
}
.save-row.visible { display: flex; }
.save-btn {
  background: none;
  border: 1px solid var(--cream-border);
  padding: 0.5rem 1.2rem;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
  transition: all 0.2s;
}
.save-btn:hover { background: var(--cream); color: var(--text); }

.format-select {
  display: inline-flex;
  gap: 0.4rem;
  margin-left: 0.5rem;
}
.format-btn {
  background: none;
  border: 1px solid var(--cream-border);
  padding: 0.4rem 0.8rem;
  font-family: sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
}
.format-btn.active { background: var(--text); color: #f0e6c8; border-color: var(--text); }
.format-btn:hover:not(.active) { background: var(--cream); }

.entry-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: 0.6rem;
  font-family: sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
  user-select: none;
}
.entry-toggle input { margin: 0; cursor: pointer; accent-color: var(--gold-dark); }

/* Off-screen container for rendering */
.share-card-container {
  position: fixed;
  top: -10000px;
  left: 0;
  pointer-events: none;
  z-index: -1;
}
.share-card {
  padding: 2.2rem;
  font-family: 'EB Garamond', Georgia, serif;
  color: #1a2540;
  background: radial-gradient(ellipse at 30% 15%, #faecc4 0%, #f5dca0 18%, #e6c080 38%, #b8a890 65%, #8a92a0 88%);
  box-shadow: inset 0 0 60px rgba(40, 55, 95, 0.10);
}
.share-card.format-default { width: 560px; }
.share-card.format-square { width: 1080px; padding: 4rem; }
.share-card.format-story { width: 1080px; padding: 4rem 3rem; }

.sc-header { text-align: center; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(120, 105, 80, 0.4); }
.sc-header-name { font-family: sans-serif; font-size: 11px; letter-spacing: 0.38em; color: #a82010; font-weight: 600; margin-bottom: 0.4rem; }
.sc-header-sub { font-family: sans-serif; font-size: 8.5px; letter-spacing: 0.22em; text-transform: uppercase; color: #c85810; }
.share-card.format-square .sc-header-name { font-size: 18px; }
.share-card.format-square .sc-header-sub { font-size: 13px; }
.share-card.format-story .sc-header-name { font-size: 20px; }
.share-card.format-story .sc-header-sub { font-size: 14px; }

.sc-you-wrote { padding: 1rem 0; border-bottom: 1px solid rgba(120, 105, 80, 0.35); }
.sc-label { font-family: sans-serif; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #c85810; margin-bottom: 0.35rem; font-weight: 700; }
.sc-you-wrote-text { font-size: 13px; font-style: italic; color: #2a3555; line-height: 1.55; }
.sc-opening { padding: 1.2rem 0; font-size: 14.5px; line-height: 1.75; color: #1a2540; border-bottom: 1px solid rgba(120, 105, 80, 0.35); }

.sc-term-block { padding: 1.4rem 0 1.2rem; }
.sc-term-scripts { display: flex; gap: 2.5rem; align-items: flex-start; margin-bottom: 1.1rem; flex-wrap: wrap; }
.sc-script-sa { font-family: 'Noto Serif Devanagari', Georgia, serif; font-size: 24px; color: #1a2540; line-height: 1.2; }
.sc-script-bo { font-family: 'Jomolhari', Georgia, serif; font-size: 21px; color: #1a2540; line-height: 1.3; }
.sc-script-roman { font-family: 'EB Garamond', serif; font-size: 14px; font-style: italic; color: #c85810; letter-spacing: 0.02em; margin-top: 0.15rem; }
.sc-term-first { font-size: 14px; color: #1a2540; font-weight: 500; line-height: 1.7; margin-bottom: 0.5rem; }
.sc-term-body { font-size: 13px; color: #3a4565; line-height: 1.8; }

.sc-seal { padding: 0.9rem 0; font-size: 13px; font-style: italic; color: #3a4565; line-height: 1.75; border-top: 1px solid rgba(120, 105, 80, 0.35); border-bottom: 1px solid rgba(120, 105, 80, 0.35); }

.sc-figure-source { padding: 1.2rem 0 1.4rem; }
.sc-figure-name { font-size: 15px; color: #1a2540; font-weight: 500; margin-bottom: 0.6rem; }
.sc-source-ref { font-family: sans-serif; font-size: 10px; letter-spacing: 0.16em; color: #a82010; margin-bottom: 0.6rem; font-weight: 700; }
.sc-source-ref em { font-family: 'EB Garamond', serif; text-transform: none; letter-spacing: 0.02em; font-size: 13px; font-style: italic; }
.sc-source-box { background: rgba(255, 251, 240, 0.85); padding: 0.9rem 1.1rem; border-left: 2px solid #a82010; border-radius: 2px; }
.sc-source-passage { font-size: 13px; font-style: italic; color: #1a2540; line-height: 1.75; margin-bottom: 0.4rem; }
.sc-source-trans { font-family: sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #3a4565; }
.sc-gloss { padding: 0.7rem 0.3rem 0; font-size: 11.5px; font-style: italic; color: #5a6580; line-height: 1.7; }

.sc-verse { padding: 1.2rem 0 1.4rem; border-bottom: 1px solid rgba(120, 105, 80, 0.4); }
.sc-verse-text { font-size: 14px; font-style: italic; color: #1a2540; line-height: 2; margin-bottom: 0.5rem; }
.sc-verse-attr { font-family: sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #c85810; font-weight: 600; }
.sc-verse-attr em { font-family: 'EB Garamond', serif; text-transform: none; letter-spacing: 0.02em; font-size: 11px; font-style: italic; }

.sc-image-block { background: rgba(255, 251, 240, 0.55); padding: 1rem; margin: 0.5rem 0 1.2rem; text-align: center; border-radius: 2px; }
.sc-image-block img { max-width: 100%; max-height: 340px; object-fit: contain; display: block; margin: 0 auto 0.9rem; }
.sc-image-title { font-family: sans-serif; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: #a82010; font-weight: 700; margin-bottom: 0.5rem; }
.sc-image-why { font-size: 12.5px; color: #3a4565; font-style: italic; line-height: 1.7; }
.sc-footer { text-align: center; padding-top: 1.2rem; border-top: 1px solid rgba(120, 105, 80, 0.35); font-family: sans-serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: #c85810; }

.share-card.format-square .sc-script-sa { font-size: 38px; }
.share-card.format-square .sc-script-bo { font-size: 32px; }
.share-card.format-square .sc-script-roman, .share-card.format-square .sc-you-wrote-text, .share-card.format-square .sc-opening, .share-card.format-square .sc-term-first, .share-card.format-square .sc-term-body, .share-card.format-square .sc-seal, .share-card.format-square .sc-figure-name, .share-card.format-square .sc-source-passage, .share-card.format-square .sc-verse-text { font-size: 22px; }
.share-card.format-square .sc-label, .share-card.format-square .sc-source-ref, .share-card.format-square .sc-source-trans, .share-card.format-square .sc-image-title, .share-card.format-square .sc-image-why, .share-card.format-square .sc-verse-attr, .share-card.format-square .sc-gloss, .share-card.format-square .sc-footer { font-size: 16px; }

.share-card.format-story .sc-script-sa { font-size: 42px; }
.share-card.format-story .sc-script-bo { font-size: 36px; }
.share-card.format-story .sc-script-roman, .share-card.format-story .sc-you-wrote-text, .share-card.format-story .sc-opening, .share-card.format-story .sc-term-first, .share-card.format-story .sc-term-body, .share-card.format-story .sc-seal, .share-card.format-story .sc-figure-name, .share-card.format-story .sc-source-passage, .share-card.format-story .sc-verse-text { font-size: 24px; }
.share-card.format-story .sc-label, .share-card.format-story .sc-source-ref, .share-card.format-story .sc-source-trans, .share-card.format-story .sc-image-title, .share-card.format-story .sc-image-why, .share-card.format-story .sc-verse-attr, .share-card.format-story .sc-gloss, .share-card.format-story .sc-footer { font-size: 18px; }

.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #f0e6c8;
  padding: 0.7rem 1.4rem;
  font-family: sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 2px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;
}
.toast.visible { opacity: 1; }

</style>
</head>
<body>

<div class="header">
  <div class="header-name">DHARMA'S ECHO</div>
  <div class="header-sub">the dharma echoes back what was always already there</div>
</div>

<div class="key-gate" id="keyGate">
  <div class="key-label">API Key</div>
  <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-..." />
  <button class="key-save" onclick="saveKey()">Save ›</button>
</div>

<div class="write-area">
  <textarea id="entry" placeholder="write"></textarea>
  <div class="write-hint" id="writeHint">the dharma will find the echo</div>
</div>
<div class="echo-row">
  <button class="echo-btn" id="echoBtn" onclick="submitEntry()">Echo ›</button>
</div>

<div class="loading" id="loading"><div class="loading-text">Listening...</div></div>
<div class="error" id="error">Something did not land. Please try again.</div>

<div class="response" id="response">

  <div class="you-wrote">
    <div class="you-wrote-label">You wrote</div>
    <div class="you-wrote-text" id="youWroteText"></div>
  </div>

  <div class="response-body">

    <div class="opening" id="opening"></div>

    <div class="term-block">
      <div class="term-scripts">
        <div class="term-script" id="termSanskrit"></div>
        <div class="term-script-tibetan" id="termTibetan"></div>
      </div>
      <div class="term-roman" id="termRoman"></div>
      <div class="term-first" id="termFirst"></div>
      <div class="term-body" id="termBody"></div>
    </div>

    <div class="seal-line" id="sealLine"></div>

    <hr class="section-rule">

    <div class="figure-source">
      <div class="figure-name" id="figureName"></div>
      <div class="figure-tradition" id="figureTradition"></div>
      <div class="figure-key-work" id="figureKeyWork"></div>

function selectImage(keywords) {
  const terms = (keywords || '').toLowerCase();
  let best = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  let bestScore = 0;
  for (const img of IMAGES) {
    let score = 0;
    for (const tag of img.tags) { if (terms.includes(tag)) score++; }
    if (score > bestScore) { bestScore = score; best = img; }
  }
  return best;
}

const SYSTEM_PROMPT = `You are the philosophical heart of Dharma's Echo. You do not interpret, counsel, or affirm. You receive what has been written and find where in the Buddhist tradition — across all schools, centuries, and languages — that territory has been named with the greatest precision. Then the tradition speaks. You do not.

THE OPENING LINE — three possible modes, choose the most precise:

Mode 1 — a figure is directly connected to the entry's territory:
Name the figure directly. "Milarepa sang about this." "Nagarjuna spent his life on this question." "The Buddha addressed this in his first teaching." One sentence only. The figure's name comes first. Never start with "He" or "She."

Mode 2 — a specific sutra or text is the most direct source:
Name the actual text, not the category. Italicize the text title. "The *Dhammacakkappavattana Sutta* names what is present here." "This is the territory of Nagarjuna's *Mulamadhyamakakarika*." Never say "Pali sutras" as a category — name the specific sutta.

Mode 3 — a word from the entry is the clearest hook:
Echo one word or phrase from the entry, then step aside. "'Liberation' — the tradition has a precise word for what that points to." Only use this mode if a word from the entry is genuinely the sharpest entry point.

Never interpret what the person felt or experienced. Never affirm, summarize, or bridge. The opening is a door — it opens directly onto the tradition.

THE TERM — the single most precise concept. Not the broadest — the most exact.

term_sanskrit: The term in Sanskrit Devanagari script if the concept has Sanskrit form. If Pali only, use Pali romanized. Never invent a script rendering.
term_tibetan: The term in Tibetan script ONLY if you are certain it exists in the Tibetan tradition under that name with equivalent or closely related meaning. If uncertain, leave empty. If you include the Tibetan, you must also include its Wylie transliteration in term_tibetan_roman. Accuracy over completeness.
term_tibetan_roman: Wylie transliteration of the Tibetan term if term_tibetan is provided — else empty string.
term_transliteration: Full romanized form of the PRIMARY term (Sanskrit or Pali) with diacritics.
term_tradition: Pali / Sanskrit / Tibetan / Sanskrit and Tibetan — only list traditions where the term genuinely exists with that meaning.
term_first_line: One sentence. Not the flat English word — the hook that opens the real meaning.
term_translation: TWO SENTENCES MAXIMUM. UNDER 40 WORDS TOTAL. First sentence: philosophical precision — what the tradition actually means by this term. No metaphor. Second sentence: one image beginning with "Like" — Thrinley Norbu register. Direct, simple, the image lands without explanation. The simile serves the term, not the person who wrote. Do not explain, do not elaborate, do not add context. If a third sentence feels needed, the first two are wrong. Example: "Tṛṣṇā is the thirst identified in the second noble truth as the root of dukkha. Like consciousness projecting a distant shore while standing on solid ground." Do NOT add a third sentence about Tibetan nuance — if the Tibetan differs, that goes in term_first_line, not here.

THE SEAL — conversational, one sentence, in italic register:

If the entry genuinely meets a seal:
"Your entry meets the [first/second/third/fourth] seal — [seal name]. [One-line statement of what that seal actually teaches.]"

If the entry moves against the dharma or points away from a seal:
State the relevant seal clearly and let it speak for itself. "The first seal — anicca — teaches that all compounded things are impermanent." Do not correct the person. The seal is a compass, not a judgment.

THE FIGURE — always named. Strict source hierarchy:
1. The Buddha directly, from the Pali suttas or early Mahayana sutras
2. Early Indian masters: Nagarjuna, Chandrakirti, Aryadeva, Vasubandhu, Asanga, Shantideva, Atisha
3. Among Tibetan schools, follow this order of preference unless a lower school holds the concept more precisely:
   — Nyingma first and strongly preferred: Longchenpa, Jigme Lingpa, Patrul Rinpoche, Mipham Rinpoche, Chogyur Lingpa, Dudjom Rinpoche, Yeshe Tsogyal.
     · Longchenpa (1308–1364): the master of Dzogchen, the Seven Treasuries, the vast expanse of mind. For natural state, rigpa, emptiness, the ground of being, the nature of phenomena, primordial purity — Longchenpa is almost always the most precise Tibetan voice.
     · Patrul Rinpoche: Words of My Perfect Teacher — for foundational teachings, bodhicitta, the preliminary practices, the ordinary mind that is buddha nature.
     · Jigme Lingpa: for the Heart Essence of the Vast Expanse (Longchen Nyingthig), terma, the nature of mind.
     · Mipham Rinpoche: for philosophical precision across traditions, especially where Madhyamaka meets Dzogchen.
     · Dudjom Rinpoche: for tantric view, the nature of perception, the purity of phenomena.
     · Chogyur Lingpa: for terma and Rimé territory.
     · Yeshe Tsogyal: for the feminine principle, the dakini, the ground of experience.
   — The Khyentse lineage (Jamyang Khyentse Wangpo 1820–1892, Jamgön Kongtrül Lodrö Thayé 1813–1899, Jamyang Khyentse Chökyi Lodrö 1893–1959) is NEVER prominent by default. Reach for them ONLY when the entry sits squarely in their specific territory: the Rimé non-sectarian synthesis, terma revelation, the encyclopedic integration of view across schools, or extraordinary guru devotion in the Rimé register. If the entry could be answered well by Longchenpa, Patrul Rinpoche, or Jigme Lingpa, choose them instead. The Khyentse lineage appears through precision of fit, never through rotation.
   — Sakya second: Sakya Pandita, Gorampa — for precise philosophical and Lamdre territory
   — Kagyu third — ONLY when the concept is specifically and precisely Mahamudra territory, or the entry is unmistakably in the Kagyu stream (mountain solitude, the dohas, the songs of realization). Do not default to Milarepa. Milarepa is one figure among many — reach for Longchenpa, Patrul Rinpoche, or Jigme Lingpa first unless the Kagyu match is exact.
     · Milarepa: his domain is the songs (Mila Grubum), mountain retreat, the direct path through hardship, Mahamudra realization through practice. Not a default.

   — Gelug: Tsongkhapa — when Madhyamaka philosophical precision specifically requires it
4. Later masters: Thrinley Norbu Rinpoche (elements and elemental mind), Dilgo Khyentse Rinpoche, Dzongsar Khyentse Rinpoche
5. Contemporary teachers only when nothing above fits more precisely

The figure's name always comes first in the description. Never start with "He" or "She."
One sentence only. What they refused, showed, or opened. Never biographical.

For figure_key_verb use the most precise relationship:
- "author of" — for writers of treatises and commentaries (Longchenpa, Nagarjuna, Shantideva, Patrul Rinpoche)
- "singer of" — for Milarepa and his songs
- "revealer of" — for tertöns who revealed terma (Chogyur Lingpa, Jigme Lingpa)
- "translator of" — for Marpa, whose primary role was transmission
- Leave empty for figures with no primary authored text (Tilopa, Naropa) and always for Buddha Śākyamuni

For Buddha Śākyamuni: figure_tradition, figure_dates, figure_key_verb, and figure_key_work must all be empty strings. The name alone carries everything.

THE SOURCE — strict hierarchy:
1. Pali Canon suttas — always named specifically with both the Pali name and the MN/SN/DN/AN number. E.g. "Cūḷamālunkya Sutta · MN 63" or "Dhammacakkappavattana Sutta · SN 56.11". Never just "Pali Canon" — name the specific sutta.
2. Early Mahayana sutras — Heart Sutra, Diamond Sutra, Vimalakirti Nirdesha, Lankavatara — with chapter where possible
3. Shastras — Nagarjuna's Mulamadhyamakakarika (with chapter and verse), Shantideva's Bodhicharyavatara (chapter and verse), Vasubandhu's Abhidharmakosa
4. Tibetan treasuries — Longchenpa's Precious Treasury of the Dharmadhatu, Patrul Rinpoche's Words of My Perfect Teacher (chapter), Milarepa's Hundred Thousand Songs (song name/number)
5. Other texts only if more precise than the above

Passage: under 40 words, verified and precise. From Pali Canon, use Bhikkhu Bodhi or Bhikkhu Sujato translation and name them. From copyrighted translations (Padmakara, Shambhala, others), paraphrase carefully and name translator, publisher, chapter. For the translator credit always prefix with "Trans." Never invent a quote. If uncertain about the exact passage, choose one you are certain of rather than approximating.

THE IMAGE — one part:

image_subject: The single most precise visual subject for this entry. Either the figure itself (if a painting tradition for them exists — Padmasambhava, Milarepa, Tara, Avalokiteśvara, Mañjuśrī, Buddha Śākyamuni, Amitābha, Maitreya, Vajrasattva, Samantabhadra, Cakrasaṃvara, Yeshe Tsogyal) or — if the figure is a treatise author with no painting tradition — the deity, lineage holder, or visual subject that most precisely embodies the same territory. Examples:
  · Patrul Rinpoche → Padmasambhava (the Longchen Nyingthig lineage he transmitted)
  · Longchenpa → Samantabhadra (Dzogchen's primordial buddha) OR Padmasambhava (the lineage holder)
  · Jigme Lingpa → Padmasambhava (the source of his terma)
  · Mipham Rinpoche → Mañjuśrī (he was considered an emanation)
  · Shantideva → Avalokiteśvara (his tutelary deity; the embodiment of bodhicitta)
  · Nagarjuna → Mañjuśrī (his deity) OR Prajñāpāramitā (the perfection of wisdom he expounded)
  · Atisha → Tara (his tutelary deity)
  · Milarepa → Milarepa (paintings exist)
Use the figure's name itself as image_subject if a painting tradition exists. Use a precise alternate only if no paintings of the figure exist on Wikimedia Commons. Always one short noun phrase, never a description.

(The caption that connects the image to the entry will be generated separately, after the actual image is selected.)

THE VERSE — real verified verse only. Never invented. Lines separated by \\n. Not italic.

TONE: Warm, precise, learned. Never therapeutic, never wellness, never academic performance.
Forbidden: invites us to, reminds us, journey, healing, transform, sit with, hold space, unpack, explore, process, navigate, tapestry, landscape, resonate, profound.
Never use nationality words for figures. Never biography — only what they saw or showed.

async function submitEntry() {
  if (!API_KEY) { alert('Please enter your Anthropic API key first.'); return; }
  const entry = document.getElementById('entry').value.trim();
  if (!entry) return;
  lastEntryText = entry;

  const btn = document.getElementById('echoBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('response').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');
  document.getElementById('againRow').classList.remove('visible');
  const saveRowSubmit = document.getElementById('saveRow');
  if (saveRowSubmit) saveRowSubmit.classList.remove('visible');
  // Reset include-entry toggle so each new entry starts with it off
  const toggleSubmit = document.getElementById('includeEntryToggle');
  if (toggleSubmit) toggleSubmit.checked = false;
  const youWroteBlockSubmit = document.getElementById('scYouWroteBlock');
  if (youWroteBlockSubmit) youWroteBlockSubmit.style.display = 'none';
  // Reset visibility of image block in case last response hid it
  const imgBlock = document.querySelector('.image-block');
  if (imgBlock) imgBlock.style.display = '';
  document.querySelectorAll('.divider').forEach(d => d.style.display = '');
  document.getElementById('youWroteText').textContent = entry;
  document.querySelector('.write-area').style.display = 'none';
  document.querySelector('.echo-row').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1400,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Journal entry: "${entry}"` }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    render(d);

  } catch(e) {
    console.error(e);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('error').classList.add('visible');
    btn.disabled = false;
    document.querySelector('.write-area').style.display = '';
    document.querySelector('.echo-row').style.display = '';
  }
}

function render(d) {
  document.getElementById('loading').classList.remove('visible');

  // Render opening — italicize text titles wrapped in *...*
  const openingEl = document.getElementById('opening');
  const openingRaw = d.opening || '';
  openingEl.innerHTML = openingRaw.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  document.getElementById('termSanskrit').textContent = d.term_sanskrit || '';
  const tibEl = document.getElementById('termTibetan');
  if (d.term_tibetan && d.term_tibetan.trim()) {
    tibEl.textContent = d.term_tibetan;
    tibEl.style.display = '';
  } else {
    tibEl.style.display = 'none';
  }
  // Build romanized line: primary term · tradition, plus Tibetan Wylie if present
  let romanLine = (d.term_transliteration || '') + ' · ' + (d.term_tradition || '');
  if (d.term_tibetan_roman && d.term_tibetan_roman.trim()) {
    romanLine += ' · ' + d.term_tibetan_roman + ' (Tibetan)';
  }
  document.getElementById('termRoman').textContent = romanLine;
  document.getElementById('termFirst').textContent = d.term_first_line || '';
  document.getElementById('termBody').textContent = d.term_translation || '';

  document.getElementById('sealLine').textContent = d.seal || '';

  document.getElementById('figureName').textContent = d.figure_name || '';

  // Build single tradition line: Tradition · Dates · verb of *Work*
  const tradEl = document.getElementById('figureTradition');
  let tradHTML = '';
  let tradParts = [];
  if (d.figure_tradition) tradParts.push(d.figure_tradition);
  if (d.figure_dates) tradParts.push(d.figure_dates);
  tradHTML = tradParts.join(' · ');
  if (d.figure_key_verb && d.figure_key_work) {
    tradHTML += ' · ' + d.figure_key_verb + ' <em>' + d.figure_key_work + '</em>';
  }
  tradEl.innerHTML = tradHTML;

  // Hide separate key work element — now folded into tradition line
  const keyEl = document.getElementById('figureKeyWork');
  if (keyEl) keyEl.style.display = 'none';

  document.getElementById('figureDesc').textContent = d.figure_description || '';

  // Source title: italic Pali/Sanskrit name, then reference in uppercase
  const sourceTitleEl = document.getElementById('sourceTitle');
  if (d.source_text) {
    let titleHTML = '<em>' + d.source_text + '</em>';
    if (d.source_reference) {
      titleHTML += ' <span class="source-ref-upper">· ' + d.source_reference + '</span>';
    }
    sourceTitleEl.innerHTML = titleHTML;
  } else {
    sourceTitleEl.textContent = '';
  }
  document.getElementById('sourcePassage').textContent = '\u201C' + (d.source_passage || '') + '\u201D';
  document.getElementById('sourceTranslator').textContent = d.source_translation || '';

  // Image: async Wikimedia search with image_subject fallback
  loadImage(d).catch(e => {
    console.error('Image load failed:', e);
    hideImageBlock();
  });

  const lines = (d.verse_text || '').split('\n').map(l => l.trim()).filter(Boolean);
  document.getElementById('verseText').innerHTML = lines.join('<br>');
  // Verse attribution — strip tradition from Buddha Śākyamuni
  let verseAttr = d.verse_attribution || '';
  if (verseAttr.includes('Buddha') && verseAttr.includes('Theravada')) {
    verseAttr = verseAttr.replace(/[·\s]*Theravada[\s]*/g, '');
  }
  document.getElementById('verseAttr').textContent =
    verseAttr + (d.verse_source ? ' · ' + d.verse_source : '');

  document.getElementById('response').classList.add('visible');
  document.getElementById('againRow').classList.add('visible');
  document.getElementById('saveRow').classList.add('visible');
  populateShareCard(d);
  document.getElementById('response').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Image loading: Wikimedia first, then second Claude call for caption ──
async function loadImage(d) {
  const figureName = d.figure_name || '';
  const imageSubject = d.image_subject || figureName;

  // Debug panel
  const debugLines = [];
  debugLines.push('figure_name: ' + figureName);
  debugLines.push('image_subject: ' + imageSubject);

  // Try figure_name first (in case it has paintings even though image_subject differs)
  let result = await searchWikimediaForFigure(figureName, debugLines);

  // If no result and image_subject is different, try it
  if (!result && imageSubject && imageSubject.toLowerCase() !== figureName.toLowerCase()) {
    debugLines.push('--- trying image_subject ---');
    result = await searchWikimediaForFigure(imageSubject, debugLines);
  }

  // Show debug
  showDebug(debugLines, result);

  if (!result) {
    hideImageBlock();
    return;
  }

  // Render the image first — caption arrives second
  const artEl = document.getElementById('artImg');
  artEl.src = result.url;
  artEl.alt = result.title;
  artEl.style.display = 'block';
  artEl.onerror = function() { hideImageBlock(); };
  document.getElementById('imgTitle').textContent = result.cleanTitle;

  // Show "Loading..." state for caption while it generates
  document.getElementById('imgWhy').textContent = '';

  // Now make a second call to Claude to get a caption that fits THIS image
  try {
    const caption = await generateImageCaption(d, result.cleanTitle);
    if (caption) {
      document.getElementById('imgWhy').textContent = caption;
    }
  } catch (e) {
    console.error('Caption generation failed:', e);
  }
}

async function generateImageCaption(d, actualImageTitle) {
  const captionPrompt = `Write one caption with three parts in this exact order, separated by punctuation:

PART 1 — Name the figure or subject in the image (the actual figure visible).
PART 2 — A very brief lineage or relationship clause (only if image_subject differs from figure_name) — e.g. "Patrul Rinpoche's root teacher", "Nagarjuna's tutelary deity". Skip if image_subject equals figure_name.
PART 3 — A specific visible feature of the image, then a verb, then a 5-9 word distillation of THE TEACHING — what the source passage and verse are pointing to. NOT a paraphrase of what the person wrote.

CRITICAL — what Part 3 distills:

The 5-9 word phrase at the end is a distillation of the DHARMA TEACHING that the response is offering — what is in the source quote and the verse. It is NOT a summary of the person's entry.

Look at:
- The source passage: "${d.source_passage || ''}"
- The verse: "${d.verse_text || ''}"
- The term: ${d.term_transliteration} — ${d.term_first_line}

The phrase at the end of Part 3 should distill what these are saying. The image embodies this teaching.

The entry tells us what the person needs the teaching to meet. But the caption does not paraphrase the entry — it names what the teaching is, which is the answer to the entry.

CRITICAL — verb logic:

Every image in this app is a teaching image. The image makes the dharma teaching visible. The caption names how it does so. The verb must reflect this — the image is not a mirror of the person's entry. It is making the teaching visible.

Verbs to use:
- For peaceful figures or pure realms or any image that shows the path/answer: SHOWS, REVEALS, EMBODIES, POINTS TO, MAKES VISIBLE, NAMES, OPENS
- For wrathful figures (Mahakala, Guru Dragpur, Vajrakilaya, fierce dakinis): BURNS THROUGH, CUTS THROUGH, CONSUMES, DISSOLVES, SEVERS — what they destroy is delusion, clinging, fear, obstacles
- For samsaric depictions (wheel of life, six realms, hell realms, bardo, Mara's army): NAMES, SHOWS, MAKES VISIBLE — they make the teaching about that territory visible

NEVER use "echoes", "reflects", or "mirrors" — these imply the image is a mirror of the person's experience, which is not the relationship. The image makes the teaching visible.

Inputs:
- The figure who addresses this entry: ${d.figure_name}
- The image subject Claude chose: ${d.image_subject || d.figure_name}
- The actual image title: "${actualImageTitle}"
- They wrote (for context only — do NOT paraphrase): "${lastEntryText}"

Examples (notice each Part 3 distills the teaching, NOT the entry, and uses a teaching-verb):

Peaceful figures (use shows/reveals/embodies/points to/names):
- "Padmasambhava with rainbow body — the dissolving form shows the mind that holds everything yet remains unstained."
- "Tara — her stepping foot reveals the swift compassion that meets fear before fear can arise."
- "Mañjuśrī, Nagarjuna's tutelary deity — the upraised sword embodies the wisdom that severs every fixed view."
- "Avalokiteśvara — the thousand arms point to compassion that reaches every being without exception."
- "Buddha Śākyamuni — his teaching gesture shows the path of release from craving."
- "Buddha Amitābha in his Pure Land — the blissful field reveals the buddha-nature already present in awareness."

Wrathful figures (use burns through/cuts through/consumes):
- "Guru Dragpur, wrathful Padmasambhava — the surrounding flames burn through the delusion that obscures awareness."
- "Mahakala — his fierce gaze cuts through the obstacles that hide the natural state."

Samsaric or realm depictions (use names/shows/makes visible):
- "The wheel of life at the center — its turning shows the samsaric round the teaching reveals as suffering."
- "Mt. Meru and the Buddhist universe — the layered realms make visible the cosmology the teaching points beyond."
- "The bardo figures wandering between worlds — they name the in-between state the teaching meets with awareness."

Format rules:
- Comma between Part 1 and Part 2 if Part 2 is included.
- Em dash (—) before Part 3.
- 18-26 words total.
- Do not begin with "Tibetan", "This", "The image".
- Do NOT mention what the person "wrote" or "described" or "feels" or any phrasing of their entry.
- The end of the sentence is the teaching distilled.

Now write one caption. No quotes. No preamble.

BEFORE RETURNING, check your draft against these three failure patterns and rewrite if any apply:

CHECK 1 — Does your sentence contain "echo", "echoes", "echoing", "reflects", "reflecting", "mirrors", or "mirroring"? If yes → REWRITE using a teaching-verb (shows, reveals, embodies, points to, names, opens, makes visible — or for wrathful figures: burns through, cuts through, consumes).

CHECK 2 — Does the end of your sentence paraphrase or summarize what the person wrote? Common slips: "the disconnection from one's lived day", "the longing to find home", "the ache of not belonging", "the wandering mind", "the search that defeats itself". If yes → REWRITE. The end of your sentence must distill THE TEACHING in the source quote and verse, not paraphrase the entry.

CHECK 3 — Does your sentence start with "Tibetan", "This", "The image", "Buddhist art"? If yes → REWRITE starting with the figure or visible subject.

Only return the final sentence after passing all three checks. No quotes, no preamble.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 150,
      temperature: 0.1,
      messages: [{ role: 'user', content: captionPrompt }]
    })
  });

  if (!res.ok) return null;
  const data = await res.json();
  const text = data.content.map(b => b.text || '').join('').trim();
  // Strip any quotes the model might have added despite instructions
  return text.replace(/^["'`]+|["'`]+$/g, '');
}

async function searchWikimediaForFigure(figure, debugLines) {
  if (!figure) {
    if (debugLines) debugLines.push('  search: empty figure, skip');
    return null;
  }
  // Strip honorifics that confuse search
  const cleaned = figure.replace(/Rinpoche|Lama|Bhante/g, '').trim();
  // Strip diacritics for filter matching (Śākyamuni → Sakyamuni)
  const stripDiacritics = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  const cleanedNoDiacritics = stripDiacritics(cleaned);
  const query = cleaned + ' thangka';
  if (debugLines) debugLines.push('  search: "' + query + '"');
  const url = 'https://commons.wikimedia.org/w/api.php?' +
    'action=query&format=json&origin=*' +
    '&generator=search&gsrnamespace=6' +
    '&gsrsearch=' + encodeURIComponent(query) +
    '&gsrlimit=15' +
    '&prop=imageinfo&iiprop=url|size|mediatype&iiurlwidth=600';

  try {
    const res = await fetch(url);
    if (!res.ok) {
      if (debugLines) debugLines.push('  HTTP ' + res.status);
      return null;
    }
    const data = await res.json();
    if (!data.query || !data.query.pages) {
      if (debugLines) debugLines.push('  no pages in response');
      return null;
    }

    const allResults = Object.values(data.query.pages);
    if (debugLines) {
      debugLines.push('  raw results: ' + allResults.length);
      allResults.slice(0, 5).forEach(p => debugLines.push('    - ' + p.title));
    }

    const candidates = allResults
      .filter(p => p.imageinfo && p.imageinfo[0])
      .filter(p => p.imageinfo[0].mediatype === 'BITMAP')
      .filter(p => p.imageinfo[0].size > 50000)
      .filter(p => {
        const t = stripDiacritics(p.title);
        const figureWords = cleanedNoDiacritics.split(/\s+/).filter(w => w.length > 3);
        const hasFigure = figureWords.some(w => t.includes(w));
        const isStrongArtwork = /thangka|thanka|painting/i.test(t);
        const isSoftArtwork = /tibetan|nepali|nepal|bhutanese|sculpture|wellcome|museum/i.test(t);
        // Pass if: strong artwork keyword, OR figure name is in title (figure-named files are usually artworks)
        return isStrongArtwork || hasFigure;
      });

    if (debugLines) debugLines.push('  after filter: ' + candidates.length);

    if (candidates.length === 0) return null;

    // Score and sort: figure name + artwork keyword in title gets top priority
    candidates.sort((a, b) => {
      const ta = stripDiacritics(a.title);
      const tb = stripDiacritics(b.title);
      const aHasFig = ta.includes(cleanedNoDiacritics) ? 1 : 0;
      const bHasFig = tb.includes(cleanedNoDiacritics) ? 1 : 0;
      const aIsArt = /thangka|thanka|painting/i.test(ta) ? 1 : 0;
      const bIsArt = /thangka|thanka|painting/i.test(tb) ? 1 : 0;
      return (bHasFig + bIsArt) - (aHasFig + aIsArt);
    });

    // Pick randomly from top 5 (or however many we have) for variety
    const topPool = candidates.slice(0, Math.min(5, candidates.length));
    const chosen = topPool[Math.floor(Math.random() * topPool.length)];

    if (debugLines) debugLines.push('  pool size: ' + topPool.length);

    const cleanTitle = chosen.title
      .replace(/^File:/, '')
      .replace(/_/g, ' ')
      .replace(/\.[a-z]+$/i, '');

    return {
      url: chosen.imageinfo[0].thumburl || chosen.imageinfo[0].url,
      fullUrl: chosen.imageinfo[0].url,
      title: chosen.title,
      cleanTitle: cleanTitle
    };
  } catch (e) {
    if (debugLines) debugLines.push('  error: ' + e.message);
    console.error('Wikimedia search error:', e);
    return null;
  }
}

    document.getElementById('scTibGroup').style.display = 'none';
  }

  document.getElementById('scTermFirst').textContent = d.term_first_line || '';
  document.getElementById('scTermBody').textContent = d.term_translation || '';
  document.getElementById('scSeal').textContent = d.seal || '';

  const isBuddha = (d.figure_name || '').includes('Buddha Śākyamuni');

  const srcRef = document.getElementById('scSourceRef');
  const refText = d.source_text || '';
  const refNum = d.source_reference || '';
  srcRef.innerHTML = '<em>' + refText + '</em>' + (refNum ? ' · ' + refNum : '');
  document.getElementById('scSourcePassage').textContent = '\u201C' + (d.source_passage || '') + '\u201D';
  document.getElementById('scSourceTrans').textContent = d.source_translation || '';

  const gloss = document.getElementById('scGloss');
  if (isBuddha && d.figure_description) {
    let desc = d.figure_description.replace(/^Buddha Śākyamuni\s+/, '');
    desc = desc.charAt(0).toLowerCase() + desc.slice(1);
    gloss.textContent = '(' + desc.replace(/\.$/, '') + ')';
    gloss.style.display = 'block';
  } else {
    gloss.style.display = 'none';
  }

  // Verse
  const verseBlock = document.getElementById('scVerseBlock');
  const verseLines = (d.verse_text || '').split('\n').map(l => l.trim()).filter(Boolean);
  if (verseLines.length > 0) {
    document.getElementById('scVerseText').innerHTML = verseLines.join('<br>');
    let attr = d.verse_attribution || '';
    if (attr.includes('Buddha') && attr.includes('Theravada')) {
      attr = attr.replace(/[·\s]*Theravada[\s]*/g, '');
    }
    document.getElementById('scVerseAttr').innerHTML = attr + (d.verse_source ? ' · <em>' + d.verse_source + '</em>' : '');
    verseBlock.style.display = 'block';
  } else {
    verseBlock.style.display = 'none';
  }

  // Image — populated separately when image loads
  syncShareCardImage();

async function preloadShareImage() {
  const img = document.getElementById('scImg');
  if (!img.src || img.src.startsWith('data:')) return;
  try {
    const r = await fetch(img.src);
    if (!r.ok) return;
    const blob = await r.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
    return new Promise((resolve) => {
      const newImg = new Image();
      newImg.onload = () => { img.src = dataUrl; setTimeout(resolve, 200); };
      newImg.onerror = () => resolve();
      newImg.src = dataUrl;
    });
  } catch (e) {
    console.warn('Image preload failed:', e);
  }
}

async function shareCard() {
  const toast = document.getElementById('toast');
  toast.textContent = 'Preparing...';
  toast.classList.add('visible');
  try {
    const container = document.getElementById('shareCardContainer');
    container.style.top = '0';
    container.style.left = '-10000px';
    await preloadShareImage();
    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, {
      backgroundColor: null, scale: 2, useCORS: true, allowTaint: false, logging: false
    });
    container.style.top = '-10000px';

    canvas.toBlob(async (blob) => {
      if (!blob) { throw new Error('Blob failed'); }
      const file = new File([blob], 'dharmas-echo.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "Dharma's Echo", text: 'From Dharma\u2019s Echo — dharmas-echo.vercel.app' });
          toast.textContent = 'Shared';
          setTimeout(() => toast.classList.remove('visible'), 2000);
          return;
        } catch (err) {
          if (err.name === 'AbortError') { toast.classList.remove('visible'); return; }
        }
      }
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast.textContent = 'Copied to clipboard';
        setTimeout(() => toast.classList.remove('visible'), 2500);
      } catch (err) {
        const link = document.createElement('a');
        link.download = 'dharmas-echo-' + Date.now() + '.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        toast.textContent = 'Downloaded';
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
    }, 'image/png');
  } catch (e) {
    console.error('Share failed:', e);
    toast.textContent = 'Share failed';
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }
}

  <button class="save-btn" onclick="shareCard()">Share ›</button>

    <button class="format-btn active" data-format="default" onclick="setFormat('default')">Card</button>
    <button class="format-btn" data-format="square" onclick="setFormat('square')">Square</button>
    <button class="format-btn" data-format="story" onclick="setFormat('story')">Story</button>
  </div>
  <label class="entry-toggle">
    <input type="checkbox" id="includeEntryToggle" onchange="toggleIncludeEntry(this.checked)">
    <span>include your entry</span>
  </label>
</div>

<div class="share-card-container" id="shareCardContainer">
  <div class="share-card format-default" id="shareCard">
    <div class="sc-header">
      <div class="sc-header-name">DHARMA'S ECHO</div>
      <div class="sc-header-sub">the dharma echoes back your moment</div>
    </div>
    <div class="sc-you-wrote" id="scYouWroteBlock" style="display: none;">
      <div class="sc-label">You wrote</div>
      <div class="sc-you-wrote-text" id="scYouWrote"></div>
    </div>
    <div class="sc-opening" id="scOpening"></div>
    <div class="sc-term-block">
      <div class="sc-term-scripts">
        <div>
          <div class="sc-script-sa" id="scScriptSa"></div>
          <div class="sc-script-roman" id="scScriptSaRoman"></div>
        </div>
        <div id="scTibGroup" style="display:none;">
          <div class="sc-script-bo" id="scScriptBo"></div>
          <div class="sc-script-roman" id="scScriptBoRoman"></div>
        </div>
      </div>
      <div class="sc-term-first" id="scTermFirst"></div>
      <div class="sc-term-body" id="scTermBody"></div>
    </div>
    <div class="sc-seal" id="scSeal"></div>
    <div class="sc-figure-source">
      <div class="sc-figure-name" id="scFigureName"></div>
      <div class="sc-source-ref" id="scSourceRef"></div>
      <div class="sc-source-box">
        <div class="sc-source-passage" id="scSourcePassage"></div>
        <div class="sc-source-trans" id="scSourceTrans"></div>
      </div>
      <div class="sc-gloss" id="scGloss"></div>
    </div>
    <div class="sc-verse" id="scVerseBlock">
      <div class="sc-verse-text" id="scVerseText"></div>
      <div class="sc-verse-attr" id="scVerseAttr"></div>
    </div>
    <div class="sc-image-block" id="scImageBlock">
      <img id="scImg" src="" alt="" crossorigin="anonymous">
      <div class="sc-image-title" id="scImgTitle"></div>
      <div class="sc-image-why" id="scImgWhy"></div>
    </div>
    <div class="sc-footer">dharmas-echo.vercel.app</div>
  </div>
</div>

<div class="toast" id="toast">Saved</div>

</body>
</html>
