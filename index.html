<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharma's Echo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+Devanagari:wght@300;400;500&family=Jomolhari&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream: #f8f0d8;
  --cream-border: #d8c080;
  --gold: #c8a030;
  --gold-dark: #a08030;
  --amber: #b06818;
  --text: #2a2010;
  --text-mid: #4a3a18;
  --text-label: #6a5820;
  --text-faint: #c8a855;
}

body {
  background: #ffffff;
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 5rem;
}

/* ── Header ── */
.header {
  padding: 2.4rem 3rem 1.8rem;
  border-bottom: 1px solid var(--cream-border);
}
.header-name {
  font-family: sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.42em;
  font-weight: 300;
  color: var(--text);
}
.header-sub {
  font-family: sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: none;
  color: var(--gold);
  margin-top: 0.5rem;
}

/* ── Key gate ── */
.key-gate {
  padding: 0.9rem 3rem;
  border-bottom: 1px solid var(--cream-border);
  background: var(--cream);
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.key-gate.hidden { display: none; }
.key-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dark);
  white-space: nowrap;
  font-weight: 600;
}
.key-input {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--cream-border);
  padding: 0.35rem 0.5rem;
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
  background: transparent;
  min-width: 0;
}
.key-save {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
}
.key-save:hover { color: var(--text); }

/* ── Write area ── */
.write-area { padding: 3rem 3rem 0; }
textarea {
  width: 100%;
  min-height: 80px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--text);
  background: transparent;
  display: block;
}
textarea::placeholder { color: var(--text-faint); font-style: italic; font-size: 1.05rem; }
.write-hint {
  font-family: sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-top: 0.5rem;
  transition: opacity 0.3s;
}
.write-hint.hidden { opacity: 0; }

.echo-row {
  display: flex;
  justify-content: flex-end;
  padding: 1rem 3rem 2.5rem;
}
.echo-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
  transition: color 0.2s;
}
.echo-btn:hover { color: var(--text); }
.echo-btn:disabled { color: var(--text-faint); cursor: not-allowed; }

/* ── Loading ── */
.loading { display: none; padding: 2.5rem 3rem; }
.loading.visible { display: block; }
.loading-text {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── Response ── */
.response { display: none; animation: fadeIn 0.7s ease; }
.response.visible { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* You wrote */
.you-wrote {
  padding: 1.4rem 3rem 1.3rem;
  border-bottom: 1px solid var(--amber);
  margin-bottom: 1.6rem;
}
.you-wrote-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.6rem;
}
.you-wrote-text {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--gold);
  line-height: 1.9;
}

/* Response body */
.response-body { padding: 0 3rem; }

/* Opening */
.opening {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 2.4rem;
}

/* Term block */
.term-block {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--gold);
  padding: 1.8rem 2rem;
  margin-bottom: 2.4rem;
}
.term-scripts {
  display: flex;
  gap: 2.5rem;
  align-items: flex-start;
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}
.term-col { display: flex; flex-direction: column; }
.term-script {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.56rem;
  font-weight: 300;
  color: #a82010;
  letter-spacing: 0.02em;
  line-height: 1.3;
}
.term-script-tibetan {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.36rem;
  font-weight: 300;
  color: #a82010;
  line-height: 1.4;
}
.term-script-roman {
  font-family: 'Lora', Georgia, serif;
  font-size: 0.92rem;
  font-style: italic;
  color: #a82010;
  letter-spacing: 0.02em;
  margin-top: 0.25rem;
}
.term-inline { color: #a82010; }
.term-first {
  font-size: 0.97rem;
  line-height: 1.85;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.term-body {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
}

/* Section divider — amber line */
.section-rule {
  border: none;
  border-top: 1px solid var(--amber);
  margin: 0 0 2.4rem;
  opacity: 0.5;
}

/* Figure + Source */
.figure-source { margin-bottom: 2.4rem; }

.figure-name {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.figure-tradition {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.16em;
  text-transform: none;
  color: var(--gold-dark);
  margin-bottom: 0.7rem;
}
.figure-key-work {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.12em;
  text-transform: none;
  color: var(--gold-dark);
  margin-bottom: 0.6rem;
}
.figure-key-work em {
  font-style: italic;
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.75rem;
}
.figure-desc {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
  margin-bottom: 1.6rem;
}
.source-title {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.14em;
  color: #a82010;
  margin-bottom: 0.9rem;
  padding-bottom: 0.7rem;
  border-bottom: 1px solid var(--cream-border);
}
.source-title em {
  font-style: italic;
  font-family: 'Lora', Georgia, serif;
  letter-spacing: 0.02em;
  font-size: 0.78rem;
}
.source-title .source-ref-upper {
  letter-spacing: 0.18em;
  text-transform: none;
  font-size: 0.62rem;
}
.source-box {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--amber);
  padding: 1.2rem 1.6rem;
}
.source-passage {
  font-size: 0.97rem;
  font-style: normal;
  color: var(--text);
  line-height: 1.9;
  margin-bottom: 0.55rem;
}
.source-translator {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.14em;
  text-transform: none;
  color: var(--text-label);
}

/* Divider star */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2.4rem 0;
}
.divider-line { flex:1; height:1px; background: var(--amber); opacity: 0.4; }
.mp-sunburst { flex: none; filter: drop-shadow(0 0 2px rgba(240, 184, 28, 0.9)) drop-shadow(0 0 4px rgba(240, 184, 28, 0.45)); }
.mp-sunburst line { stroke: #f2bc1a; stroke-width: 1.4; }

/* Image — clean, sits on the background (works for thangkas and sculptures alike) */
.image-block {
  background: none;
  border: none;
  padding: 0;
  margin-bottom: 2rem;
  text-align: center;
}
.image-block img {
  max-width: 88%;
  max-height: 420px;
  object-fit: contain;
  display: block;
  margin: 0 auto 1.1rem;
}
.image-title {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.16em;
  text-transform: none;
  color: var(--gold-dark);
  margin-bottom: 0.6rem;
  text-align: center;
}
.image-why {
  font-size: 1.05rem;
  color: var(--text);
  line-height: 1.7;
  text-align: left;
}

/* Verse */
.verse-block { margin-bottom: 1rem; }
.verse-label {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 1rem;
}
.verse-text {
  font-family: 'Lora', Georgia, serif;
  font-size: 1rem;
  font-weight: 400;
  font-style: normal;
  color: var(--text);
  line-height: 1.65;
  margin-bottom: 0.8rem;
}
.verse-attr {
  font-family: sans-serif;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  text-transform: none;
  color: #a82010;
  font-weight: 600;
}
.verse-attr em {
  font-family: sans-serif;
  font-style: italic;
  font-weight: 700;
  font-size: 1em;
  letter-spacing: 0.01em;
}

/* Again */
.again-row { padding: 2rem 3rem 0; display: none; }
.again-row.visible { display: flex; }
.again-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0;
}
.again-btn:hover { color: var(--text); }

/* Error */
.error { display: none; padding: 1rem 3rem; color: #904040; font-style: italic; font-size: 0.9rem; }
.error.visible { display: block; }
/* ── Save / Share row ── */
.save-row {
  padding: 1rem 3rem 0;
  display: none;
  justify-content: flex-start;
  gap: 0.6rem;
  flex-wrap: wrap;
  align-items: center;
}
.save-row.visible { display: flex; }
.save-btn {
  background: none;
  border: 1px solid var(--cream-border);
  padding: 0.5rem 1.2rem;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
  transition: all 0.2s;
}
.save-btn:hover { background: var(--cream); color: var(--text); }

.format-select {
  display: inline-flex;
  gap: 0.4rem;
  margin-left: 0.5rem;
}
.format-btn {
  background: none;
  border: 1px solid var(--cream-border);
  padding: 0.4rem 0.8rem;
  font-family: sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
}
.format-btn.active { background: var(--text); color: #f0e6c8; border-color: var(--text); }
.format-btn:hover:not(.active) { background: var(--cream); }

.entry-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: 0.6rem;
  font-family: sans-serif;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
  user-select: none;
}
.entry-toggle input { margin: 0; cursor: pointer; accent-color: var(--gold-dark); }

/* Off-screen container for rendering */
.share-card-container {
  position: fixed;
  top: -10000px;
  left: 0;
  pointer-events: none;
  z-index: -1;
}
.share-card {
  padding: 2.2rem;
  font-family: 'EB Garamond', Georgia, serif;
  color: #1a2540;
  background: radial-gradient(ellipse at 30% 15%, #faecc4 0%, #f5dca0 18%, #e6c080 38%, #b8a890 65%, #8a92a0 88%);
  box-shadow: inset 0 0 60px rgba(40, 55, 95, 0.10);
}
/* Verse: vertical, before the image, set off by glowing sunburst hairline dividers (no box) */
.sc-verse { padding: 0.4rem 0 0.8rem; text-align: center; border-bottom: none; }
.sc-verse-divider { display: flex; align-items: center; gap: 14px; margin: 1.2rem 0; }
.sc-verse-rule { flex: 1; height: 1px; background: rgba(120, 105, 80, 0.45); }
.sc-sunburst { flex: none; filter: drop-shadow(0 0 2.5px rgba(240, 184, 28, 0.95)) drop-shadow(0 0 5px rgba(240, 184, 28, 0.5)); }
.sc-sunburst line { stroke: #f2bc1a; stroke-width: 1.3; }
.share-card.format-default { width: 560px; }
.share-card.format-square { width: 1080px; padding: 4rem; }
.share-card.format-story { width: 1080px; padding: 4rem 3rem; }

.sc-header { text-align: center; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(120, 105, 80, 0.4); }
.sc-header-name { font-family: sans-serif; font-size: 11px; letter-spacing: 0.38em; color: #a82010; font-weight: 600; margin-bottom: 0.4rem; }
.sc-header-sub { font-family: sans-serif; font-size: 9px; letter-spacing: 0.16em; text-transform: none; color: #a82010; }
.share-card.format-square .sc-header-name { font-size: 18px; }
.share-card.format-square .sc-header-sub { font-size: 13px; }
.share-card.format-story .sc-header-name { font-size: 20px; }
.share-card.format-story .sc-header-sub { font-size: 14px; }

.sc-you-wrote { padding: 1rem 0; border-bottom: 1px solid rgba(120, 105, 80, 0.35); }
.sc-label { font-family: sans-serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: #a82010; margin-bottom: 0.35rem; font-weight: 700; }
.sc-you-wrote-text { font-size: 16px; font-style: italic; color: #2a3555; line-height: 1.55; }

.sc-term-block { padding: 1.4rem 0 1.2rem; }
.sc-term-scripts { display: flex; gap: 2.5rem; align-items: flex-start; margin-bottom: 1.1rem; flex-wrap: wrap; }
.sc-script-sa { font-family: 'Noto Serif Devanagari', Georgia, serif; font-size: 24px; color: #1a2540; line-height: 1.2; }
.sc-script-bo { font-family: 'Jomolhari', Georgia, serif; font-size: 21px; color: #1a2540; line-height: 1.3; }
.sc-script-roman { font-family: 'EB Garamond', serif; font-size: 18px; font-style: italic; color: #a82010; letter-spacing: 0.02em; margin-top: 0.2rem; }
.sc-figure-meta { font-family: sans-serif; font-size: 13px; letter-spacing: 0.04em; text-transform: none; color: #a82010; font-weight: 600; margin-bottom: 0.5rem; }
.sc-synthesis { font-size: 17px; color: #1a2540; line-height: 1.65; margin-bottom: 0.2rem; }
.sc-synthesis em { font-style: italic; color: #a82010; }
.sc-term-body { display: none; }
.sc-term-inline { color: #a82010; }

.sc-figure-source { padding: 0.5rem 0 0.4rem; }
.sc-figure-name { font-size: 16px; color: #a82010; font-weight: 500; margin-bottom: 0.6rem; }

.sc-verse-text { font-size: 17px; font-style: normal; color: #1a2540; line-height: 1.55; margin-bottom: 0.85rem; }
.sc-verse-attr { font-family: sans-serif; font-size: 13px; letter-spacing: 0.04em; text-transform: none; color: #a82010; font-weight: 600; }
.sc-verse-attr em { font-family: sans-serif; text-transform: none; letter-spacing: 0.01em; font-size: 1em; font-style: italic; font-weight: 700; }

.sc-image-block { background: none; padding: 0; margin: 0.4rem 0 0.9rem; text-align: center; }
.sc-image-block img { max-width: 92%; max-height: 440px; object-fit: contain; display: block; margin: 0 auto 0.9rem; }
.sc-image-title { font-family: sans-serif; font-size: 13px; letter-spacing: 0.04em; text-transform: none; color: #a82010; font-weight: 600; margin-bottom: 0.5rem; }
.sc-image-why { font-size: 13px; color: #1a2038; line-height: 1.55; text-align: center; }

/* Square format — ~1.9x scale of Card, hierarchy preserved */
.share-card.format-square .sc-script-sa { font-size: 46px; }
.share-card.format-square .sc-script-bo { font-size: 40px; }
.share-card.format-square .sc-script-roman { font-size: 31px; }
.share-card.format-square .sc-you-wrote-text,
.share-card.format-square .sc-synthesis,
.share-card.format-square .sc-term-body,
.share-card.format-square .sc-figure-name { font-size: 30px; }
.share-card.format-square .sc-verse-text { font-size: 32px; line-height: 1.6; }
.share-card.format-square .sc-image-why { font-size: 23px; }
.share-card.format-square .sc-label,
.share-card.format-square .sc-figure-meta,
.share-card.format-square .sc-image-title,
.share-card.format-square .sc-verse-attr { font-size: 18px; }
.share-card.format-square .sc-header-sub { font-size: 17px; }
.share-card.format-square .sc-header-name { font-size: 22px; }
.share-card.format-square .sc-sunburst { width: 44px; height: 44px; }
.share-card.format-square .sc-verse-divider { margin: 1.6rem 0; }

/* Story format — same width as Square, same scale */
.share-card.format-story .sc-script-sa { font-size: 46px; }
.share-card.format-story .sc-script-bo { font-size: 40px; }
.share-card.format-story .sc-script-roman { font-size: 31px; }
.share-card.format-story .sc-you-wrote-text,
.share-card.format-story .sc-figure-name { font-size: 30px; }
/* Full-width vertical: body text large, image caption clearly smaller */
.share-card.format-story .sc-term-body { font-size: 36px; line-height: 1.55; }
.share-card.format-story .sc-synthesis { font-size: 38px; line-height: 1.55; }
.share-card.format-story .sc-verse-text { font-size: 40px; line-height: 1.55; }
.share-card.format-story .sc-image-why { font-size: 28px; }
.share-card.format-story .sc-label,
.share-card.format-story .sc-figure-meta,
.share-card.format-story .sc-image-title,
.share-card.format-story .sc-verse-attr { font-size: 18px; }
.share-card.format-story .sc-header-sub { font-size: 17px; }
.share-card.format-story .sc-header-name { font-size: 22px; }
/* Tall format runs lean to fit 9:16. The synthesis itself names the term, so the
   separate term definition is dropped here. */
.share-card.format-story .sc-term-body { display: none; }
.share-card.format-story .sc-image-block { padding: 0; margin: 0.1rem 0 0.3rem; }
.share-card.format-story .sc-image-block img { max-height: 640px; }
.share-card.format-story .sc-sunburst { width: 44px; height: 44px; }
.share-card.format-story .sc-verse-divider { margin: 1.2rem 0; }

.toast {
  position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--text); color: #f0e6c8;
  padding: 0.7rem 1.4rem;
  font-family: sans-serif; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
  border-radius: 2px; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 1000;
}
.toast.visible { opacity: 1; }

</style>
</head>
<body>

<div class="header">
  <div class="header-name">DHARMA'S ECHO</div>
  <div class="header-sub">the Dharma echoes back your moment</div>
</div>

<div class="key-gate" id="keyGate">
  <div class="key-label">API Key</div>
  <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-..." />
  <button class="key-save" onclick="saveKey()">Save ›</button>
</div>

<div class="write-area">
  <textarea id="entry" placeholder="write"></textarea>
  <div class="write-hint" id="writeHint">the Dharma will find the echo</div>
</div>
<div class="echo-row">
  <button class="echo-btn" id="echoBtn" onclick="submitEntry()">Echo ›</button>
</div>

<div class="loading" id="loading"><div class="loading-text">Listening...</div></div>
<div class="error" id="error">Something did not land. Please try again.</div>

<div class="response" id="response">

  <div class="you-wrote">
    <div class="you-wrote-label">You wrote</div>
    <div class="you-wrote-text" id="youWroteText"></div>
  </div>

  <div class="response-body">

    <div class="opening" id="opening"></div>

    <div class="term-block">
      <div class="term-scripts">
        <div class="term-col">
          <div class="term-script" id="termSanskrit"></div>
          <div class="term-script-roman" id="termSanskritRoman"></div>
        </div>

function selectImage(keywords) {
  const terms = (keywords || '').toLowerCase();
  let best = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  let bestScore = 0;
  for (const img of IMAGES) {
    let score = 0;
    for (const tag of img.tags) { if (terms.includes(tag)) score++; }
    if (score > bestScore) { bestScore = score; best = img; }
  }
  return best;
}

const SYSTEM_PROMPT = `You are the philosophical heart of Dharma's Echo. You do not interpret, counsel, or affirm. You receive what has been written and find where in the Buddhist tradition — across all schools, centuries, and languages — that territory has been named with the greatest precision. Then the tradition speaks. You do not.

THE OPENING LINE — three possible modes, choose the most precise:

Mode 1 — a figure is directly connected to the entry's territory:
Name the figure directly. "Milarepa sang about this." "Nagarjuna spent his life on this question." "The Buddha addressed this in his first teaching." One sentence only. The figure's name comes first. Never start with "He" or "She."

Mode 2 — a specific sutra or text is the most direct source:
Name the actual text, not the category. Italicize the text title. "The *Dhammacakkappavattana Sutta* names what is present here." "This is the territory of Nagarjuna's *Mulamadhyamakakarika*." Never say "Pali sutras" as a category — name the specific sutta.

Mode 3 — a word from the entry is the clearest hook:
Echo one word or phrase from the entry, then step aside. "'Liberation' — the tradition has a precise word for what that points to." Only use this mode if a word from the entry is genuinely the sharpest entry point.

Never interpret what the person felt or experienced. Never affirm, summarize, or bridge. The opening is a door — it opens directly onto the tradition.

THE TERM — the single most precise concept. Not the broadest — the most exact.

term_sanskrit: The term in Sanskrit Devanagari script if the concept has Sanskrit form. If Pali only, use Pali romanized. Never invent a script rendering.
term_tibetan: The term in Tibetan script ONLY if you are certain it exists in the Tibetan tradition under that name with equivalent or closely related meaning. If uncertain, leave empty. If you include the Tibetan, you must also include its Wylie transliteration in term_tibetan_roman. Accuracy over completeness.
term_tibetan_roman: Wylie transliteration of the Tibetan term if term_tibetan is provided — else empty string.
term_transliteration: Full romanized form of the PRIMARY term (Sanskrit or Pali) with diacritics.
term_tradition: Pali / Sanskrit / Tibetan / Sanskrit and Tibetan — only list traditions where the term genuinely exists with that meaning.
term_first_line: One sentence. Not the flat English word — the hook that opens the real meaning.
term_translation: TWO SENTENCES MAXIMUM. UNDER 40 WORDS TOTAL. First sentence: philosophical precision — what the tradition actually means by this term. No metaphor. Second sentence: one image beginning with "Like" — Thrinley Norbu register. Direct, simple, the image lands without explanation. The simile serves the term, not the person who wrote. Do not explain, do not elaborate, do not add context. If a third sentence feels needed, the first two are wrong. Example: "Tṛṣṇā is the thirst identified in the second noble truth as the root of dukkha. Like consciousness projecting a distant shore while standing on solid ground." Do NOT add a third sentence about Tibetan nuance — if the Tibetan differs, that goes in term_first_line, not here.

  · Shantideva → Avalokiteśvara (his tutelary deity; the embodiment of bodhicitta)

  · Atisha → Tara (his tutelary deity)
  · Milarepa → Milarepa (paintings exist)
Use the figure's name itself as image_subject if a painting tradition exists. Use a precise alternate only if no paintings of the figure exist on Wikimedia Commons. Always one short noun phrase, never a description.

(The caption that connects the image to the entry will be generated separately, after the actual image is selected.)

THE VERSE — real verified verse only. Never invented. Lines separated by \\n. Not italic. The verse should come from a DIFFERENT source than the source passage above — a different voice, text, or tradition — so the two illuminate the same territory from different angles rather than restating each other. The different voice may be another master, or a sutra, or a tantra — a genuinely different kind of source, not just a different author. Let the entry's territory determine which fits; draw from the established hierarchy already given (the Buddha's sutras, the early Indian masters, the tantras, and the Nyingma, Sakya, and Kagyu traditions), choosing by genuine fit, never by name. Prefer a different source from the passage above, but never force a weak or inauthentic match just to differ — a real, verified verse that genuinely fits the territory always wins over a different-but-weak one.

TONE: Warm, precise, learned. Never therapeutic, never wellness, never academic performance.
Forbidden: invites us to, reminds us, journey, healing, transform, sit with, hold space, unpack, explore, process, navigate, tapestry, landscape, resonate, profound.
Never use nationality words for figures. Never biography — only what they saw or showed.

  "share_synthesis": "ONE short flowing block for the compact share card — roughly 2–3 sentences, NOT longer. Build it by CONDENSING the actual content you wrote in figure_description and source_passage — stay true to them, do not invent new ideas or new closing lines, and do not drift into generic spiritual phrasing. Structure: (1) open by naming the term (transliteration in **double asterisks**) with its meaning in a few words, since the scripts above have no other definition — e.g. '**Śraddhā** is confidence in the path that endures beneath the coming and going of inspiration'; (2) name the FIGURE by name (never passive — say 'Patrul Rinpoche showed...', not 'it is shown...') and condense what figure_description says they showed; (3) keep the CONCRETE IMAGE from source_passage if it has one (the hook and iron ring, the fire, the river, the mirror) — that specific image is the point, do not replace it with a vague paraphrase. Weave the source title in *single asterisks* with its reference in brackets (natural case like 'Part Three, Guru Yoga'; sutta codes like 'AN 4.49' as-is). Shorter than the main page, but the same truth and the same images. NO quotation marks. Double asterisks ONLY around the term; single asterisks ONLY around the source title.",
  "source_text": "Pali or Sanskrit title in Title Case (e.g. Khaggavisāṇa Sutta — Rhinoceros Horn Sutta) — English title after a dash if it has one. Do NOT write in ALL CAPS. The title will be rendered in italics by the page; just provide the natural Title Case.",
  "source_reference": "Sutta ID, chapter, verse, or song number",
  "source_translation": "Trans. [Name] · [Publisher]",
  "source_passage": "Passage under 40 words. Paraphrased carefully if copyrighted.",
  "concept_keywords": "6–8 keywords from: dukkha, samsara, anicca, anatta, sunyata, bodhicitta, compassion, impermanence, emptiness, nirvana, rigpa, clinging, self, interdependence, liberation, wisdom, suffering, practice, renunciation, purification, natural state, four noble truths, beyond extremes, mahamudra, dzogchen, path, teaching, dharma, first sermon, buddha, viveka, solitude, mountain, madhyamaka, pali",
  "image_subject": "Single noun phrase — the figure's name if a painting tradition exists, else a precise visual alternate (deity, lineage holder, or subject embodying the same territory). See THE IMAGE instructions.",
  "verse_text": "3–5 lines. Real verified verse only. Lines separated by \\n.",
  "verse_attribution": "Name · tradition · century — omit tradition entirely if the speaker is Buddha Śākyamuni",
  "verse_source": "Title of text"
}`;

async function submitEntry() {
  if (!API_KEY) { alert('Please enter your Anthropic API key first.'); return; }
  const entry = document.getElementById('entry').value.trim();
  if (!entry) return;
  lastEntryText = entry;

  const btn = document.getElementById('echoBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('response').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');
  document.getElementById('againRow').classList.remove('visible');
  const saveRowSubmit = document.getElementById('saveRow');
  if (saveRowSubmit) saveRowSubmit.classList.remove('visible');
  // Reset include-entry toggle so each new entry starts with it off
  const toggleSubmit = document.getElementById('includeEntryToggle');
  if (toggleSubmit) toggleSubmit.checked = false;
  const youWroteBlockSubmit = document.getElementById('scYouWroteBlock');
  if (youWroteBlockSubmit) youWroteBlockSubmit.style.display = 'none';
  // Reset visibility of image block in case last response hid it
  const imgBlock = document.querySelector('.image-block');
  if (imgBlock) imgBlock.style.display = '';
  document.querySelectorAll('.divider').forEach(d => d.style.display = '');
  document.getElementById('youWroteText').textContent = entry;
  document.querySelector('.write-area').style.display = 'none';
  document.querySelector('.echo-row').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-8',
        max_tokens: 1400,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Journal entry: "${entry}"` }]
      })
    });

    const data = await res.json();
    if (!res.ok || !data.content) {
      const apiMsg = (data && data.error && data.error.message) ? data.error.message : ('HTTP ' + res.status);
      console.error('API response:', data);
      throw new Error('API: ' + apiMsg);
    }
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    render(d);

  } catch(e) {
    console.error(e);
    document.getElementById('loading').classList.remove('visible');
    const errEl = document.getElementById('error');
    errEl.textContent = (e && e.message && e.message.startsWith('API:'))
      ? e.message + ' — please try again.'
      : 'Something did not land. Please try again.';
    errEl.classList.add('visible');
    btn.disabled = false;
    document.querySelector('.write-area').style.display = '';
    document.querySelector('.echo-row').style.display = '';
  }
}

function render(d) {
  document.getElementById('loading').classList.remove('visible');

  // Render opening — italicize text titles wrapped in *...*
  const openingEl = document.getElementById('opening');
  const openingRaw = d.opening || '';
  openingEl.innerHTML = openingRaw.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  document.getElementById('termSanskrit').textContent = d.term_sanskrit || '';
  document.getElementById('termSanskritRoman').textContent = d.term_transliteration || '';
  const tibCol = document.getElementById('termTibetanCol');
  const tibEl = document.getElementById('termTibetan');
  if (d.term_tibetan && d.term_tibetan.trim()) {
    tibEl.textContent = d.term_tibetan;
    document.getElementById('termTibetanRoman').textContent = (d.term_tibetan_roman || '').trim();
    tibCol.style.display = '';
  } else {
    tibCol.style.display = 'none';
  }
  document.getElementById('termFirst').textContent = d.term_first_line || '';
  document.getElementById('termBody').textContent = d.term_translation || '';

  // Color the term burnt red wherever it opens a line (first-line OR translation body, not bold)
  (function colorOpeningTerm() {
    const translit = (d.term_transliteration || '').trim();
    if (!translit) return;
    const norm = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    [['termFirst', d.term_first_line], ['termBody', d.term_translation]].forEach(([id, txt]) => {
      if (!txt) return;
      const startWord = txt.split(/[\s—,.:;]/)[0] || '';
      if (startWord && norm(startWord) === norm(translit)) {
        document.getElementById(id).innerHTML =
          '<span class="term-inline">' + startWord + '</span>' + txt.slice(startWord.length);
      }
    });
  })();

  document.getElementById('figureName').textContent = d.figure_name || '';

  // Build single tradition line: Tradition · Dates · verb of *Work*
  const tradEl = document.getElementById('figureTradition');
  let tradHTML = '';
  let tradParts = [];
  if (d.figure_tradition) tradParts.push(d.figure_tradition);
  if (d.figure_dates) tradParts.push(d.figure_dates);
  tradHTML = tradParts.join(' · ');
  if (d.figure_key_verb && d.figure_key_work) {
    tradHTML += ' · ' + d.figure_key_verb + ' <em>' + d.figure_key_work + '</em>';
  }
  tradEl.innerHTML = tradHTML;

  // Hide separate key work element — now folded into tradition line
  const keyEl = document.getElementById('figureKeyWork');
  if (keyEl) keyEl.style.display = 'none';

  document.getElementById('figureDesc').textContent = d.figure_description || '';

  // Source title: italic Pali/Sanskrit name, then reference in uppercase
  const sourceTitleEl = document.getElementById('sourceTitle');
  if (d.source_text) {
    // Normalize to Title Case if Claude returned ALL CAPS
    let srcText = d.source_text.trim();
    const isAllCaps = srcText === srcText.toUpperCase() && /[A-Z]/.test(srcText);
    if (isAllCaps) {
      srcText = srcText.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    }
    let titleHTML = '<em>' + srcText + '</em>';
    if (d.source_reference) {
      titleHTML += ' <span class="source-ref-upper">· ' + d.source_reference + '</span>';
    }
    sourceTitleEl.innerHTML = titleHTML;
  } else {
    sourceTitleEl.textContent = '';
  }
  document.getElementById('sourcePassage').textContent = '\u201C' + (d.source_passage || '') + '\u201D';
  document.getElementById('sourceTranslator').textContent = d.source_translation || '';

  // Image: async Wikimedia search with image_subject fallback
  loadImage(d).catch(e => {
    console.error('Image load failed:', e);
    hideImageBlock();
  });

  const lines = (d.verse_text || '').split('\n').map(l => l.trim()).filter(Boolean);
  document.getElementById('verseText').innerHTML = lines.join('<br>');
  // Verse attribution — strip tradition from Buddha Śākyamuni
  let verseAttr = d.verse_attribution || '';
  if (verseAttr.includes('Buddha') && verseAttr.includes('Theravada')) {
    verseAttr = verseAttr.replace(/[·\s]*Theravada[\s]*/g, '');
  }
  // Strip literal markdown asterisks if Claude included them
  const verseSource = (d.verse_source || '').replace(/^\*+|\*+$/g, '').trim();
  document.getElementById('verseAttr').innerHTML =
    verseAttr + (verseSource ? ' · <em>' + verseSource + '</em>' : '');

  document.getElementById('response').classList.add('visible');
  document.getElementById('againRow').classList.add('visible');
  document.getElementById('saveRow').classList.add('visible');
  populateShareCard(d);
  document.getElementById('response').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Image loading: Wikimedia first, then second Claude call for caption ──
async function loadImage(d) {
  const figureName = d.figure_name || '';
  const imageSubject = d.image_subject || figureName;

  // Debug panel
  const debugLines = [];
  debugLines.push('figure_name: ' + figureName);
  debugLines.push('image_subject: ' + imageSubject);

  // Try figure_name first (in case it has paintings even though image_subject differs)
  let result = await searchWikimediaForFigure(figureName, debugLines);

  // If no result and image_subject is different, try it
  if (!result && imageSubject && imageSubject.toLowerCase() !== figureName.toLowerCase()) {
    debugLines.push('--- trying image_subject ---');
    result = await searchWikimediaForFigure(imageSubject, debugLines);
  }

  // Show debug
  showDebug(debugLines, result);

  if (!result) {
    hideImageBlock();
    return;
  }

  // Render the image first — caption arrives second
  const artEl = document.getElementById('artImg');
  artEl.src = result.url;
  artEl.alt = result.title;
  artEl.style.display = 'block';
  artEl.onerror = function() { hideImageBlock(); };
  document.getElementById('imgTitle').textContent = result.cleanTitle;

  // Show "Loading..." state for caption while it generates
  document.getElementById('imgWhy').textContent = '';

  // Now make a second call to Claude to get a caption that fits THIS image
  try {
    const caption = await generateImageCaption(d, result.cleanTitle);
    if (caption) {
      document.getElementById('imgWhy').textContent = caption;
    }
  } catch (e) {
    console.error('Caption generation failed:', e);
  }
}

async function generateImageCaption(d, actualImageTitle) {
  const captionPrompt = `Write one caption with three parts in this exact order, separated by punctuation:

PART 1 — Name the figure or subject in the image (the actual figure visible).
PART 2 — A very brief lineage or relationship clause (only if image_subject differs from figure_name) — e.g. "Patrul Rinpoche's root teacher", "Nagarjuna's tutelary deity". Skip if image_subject equals figure_name.
PART 3 — A specific visible feature of the image, then a verb, then a 5-9 word distillation of THE TEACHING — what the source passage and verse are pointing to. NOT a paraphrase of what the person wrote.

CRITICAL — what Part 3 distills:

The 5-9 word phrase at the end is a distillation of the DHARMA TEACHING that the response is offering — what is in the source quote and the verse. It is NOT a summary of the person's entry.

Look at:
- The source passage: "${d.source_passage || ''}"
- The verse: "${d.verse_text || ''}"
- The term: ${d.term_transliteration} — ${d.term_first_line}

The phrase at the end of Part 3 should distill what these are saying. The image embodies this teaching.

The entry tells us what the person needs the teaching to meet. But the caption does not paraphrase the entry — it names what the teaching is, which is the answer to the entry.

CRITICAL — verb logic:

Every image in this app is a teaching image. The image makes the dharma teaching visible. The caption names how it does so. The verb must reflect this — the image is not a mirror of the person's entry. It is making the teaching visible.

Verbs to use:
- For peaceful figures or pure realms or any image that shows the path/answer: SHOWS, REVEALS, EMBODIES, POINTS TO, MAKES VISIBLE, NAMES, OPENS
- For wrathful figures (Mahakala, Guru Dragpur, Vajrakilaya, fierce dakinis): BURNS THROUGH, CUTS THROUGH, CONSUMES, DISSOLVES, SEVERS — what they destroy is delusion, clinging, fear, obstacles
- For samsaric depictions (wheel of life, six realms, hell realms, bardo, Mara's army): NAMES, SHOWS, MAKES VISIBLE — they make the teaching about that territory visible

NEVER use "echoes", "reflects", or "mirrors" — these imply the image is a mirror of the person's experience, which is not the relationship. The image makes the teaching visible.

Inputs:
- The figure who addresses this entry: ${d.figure_name}
- The image subject Claude chose: ${d.image_subject || d.figure_name}
- The actual image title: "${actualImageTitle}"
- They wrote (for context only — do NOT paraphrase): "${lastEntryText}"

Examples (notice each Part 3 distills the teaching, NOT the entry, and uses a teaching-verb):

Peaceful figures (use shows/reveals/embodies/points to/names):
- "Padmasambhava with rainbow body — the dissolving form shows the mind that holds everything yet remains unstained."
- "Tara — her stepping foot reveals the swift compassion that meets fear before fear can arise."
- "Mañjuśrī, Nagarjuna's tutelary deity — the upraised sword embodies the wisdom that severs every fixed view."
- "Avalokiteśvara — the thousand arms point to compassion that reaches every being without exception."
- "Buddha Śākyamuni — his teaching gesture shows the path of release from craving."
- "Buddha Amitābha in his Pure Land — the blissful field reveals the buddha-nature already present in awareness."

Wrathful figures (use burns through/cuts through/consumes):
- "Guru Dragpur, wrathful Padmasambhava — the surrounding flames burn through the delusion that obscures awareness."
- "Mahakala — his fierce gaze cuts through the obstacles that hide the natural state."

Samsaric or realm depictions (use names/shows/makes visible):
- "The wheel of life at the center — its turning shows the samsaric round the teaching reveals as suffering."
- "Mt. Meru and the Buddhist universe — the layered realms make visible the cosmology the teaching points beyond."
- "The bardo figures wandering between worlds — they name the in-between state the teaching meets with awareness."

Format rules:
- Comma between Part 1 and Part 2 if Part 2 is included.
- Em dash (—) before Part 3.
- 18-26 words total.
- Do not begin with "Tibetan", "This", "The image".
- Do NOT mention what the person "wrote" or "described" or "feels" or any phrasing of their entry.
- The end of the sentence is the teaching distilled.

Now write one caption. No quotes. No preamble.

BEFORE RETURNING, check your draft against these three failure patterns and rewrite if any apply:

CHECK 1 — Does your sentence contain "echo", "echoes", "echoing", "reflects", "reflecting", "mirrors", or "mirroring"? If yes → REWRITE using a teaching-verb (shows, reveals, embodies, points to, names, opens, makes visible — or for wrathful figures: burns through, cuts through, consumes).

CHECK 2 — Does the end of your sentence paraphrase or summarize what the person wrote? Common slips: "the disconnection from one's lived day", "the longing to find home", "the ache of not belonging", "the wandering mind", "the search that defeats itself". If yes → REWRITE. The end of your sentence must distill THE TEACHING in the source quote and verse, not paraphrase the entry.

CHECK 3 — Does your sentence start with "Tibetan", "This", "The image", "Buddhist art"? If yes → REWRITE starting with the figure or visible subject.

Only return the final sentence after passing all three checks. No quotes, no preamble.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 150,
      messages: [{ role: 'user', content: captionPrompt }]
    })
  });

  if (!res.ok) return null;
  const data = await res.json();
  const text = data.content.map(b => b.text || '').join('').trim();
  // Strip any quotes the model might have added despite instructions
  return text.replace(/^["'`]+|["'`]+$/g, '');
}

  const dividers = document.querySelectorAll('.divider');

async function searchWikimediaForFigure(figure, debugLines) {
  if (!figure) {
    if (debugLines) debugLines.push('  search: empty figure, skip');
    return null;
  }
  // Strip honorifics that confuse search
  const cleaned = figure.replace(/Rinpoche|Lama|Bhante/g, '').trim();
  // Strip diacritics for filter matching (Śākyamuni → Sakyamuni)
  const stripDiacritics = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
  const cleanedNoDiacritics = stripDiacritics(cleaned);
  const query = cleaned + ' thangka';
  if (debugLines) debugLines.push('  search: "' + query + '"');
  const url = 'https://commons.wikimedia.org/w/api.php?' +
    'action=query&format=json&origin=*' +
    '&generator=search&gsrnamespace=6' +
    '&gsrsearch=' + encodeURIComponent(query) +
    '&gsrlimit=20' +
    '&prop=imageinfo&iiprop=url|size|mediatype|dimensions&iiurlwidth=600';

  try {
    const res = await fetch(url);
    if (!res.ok) {
      if (debugLines) debugLines.push('  HTTP ' + res.status);
      return null;
    }
    const data = await res.json();
    if (!data.query || !data.query.pages) {
      if (debugLines) debugLines.push('  no pages in response');
      return null;
    }

    const allResults = Object.values(data.query.pages);
    if (debugLines) {
      debugLines.push('  raw results: ' + allResults.length);
      allResults.slice(0, 5).forEach(p => debugLines.push('    - ' + p.title));
    }

    const figureWords = cleanedNoDiacritics.split(/\s+/).filter(w => w.length > 3);

    // Titles/patterns that keep surfacing but are NOT usable figure images
    // (folded textile mounts, robe photos, empty backings, etc.)
    const BLOCKED = /gyu[\s-]?thog|gyu[\s-]?tok|yon[\s-]?tan[\s-]?mgon|yonten gonpo|folded|mounted on|textile|brocade mount|silk mount|scroll mounting|conservation|verso|reverse of|back of/i;

    // Quality + relevance filter
    const candidates = allResults
      .filter(p => p.imageinfo && p.imageinfo[0])
      .filter(p => p.imageinfo[0].mediatype === 'BITMAP')
      .filter(p => p.imageinfo[0].size > 120000)
      .filter(p => !BLOCKED.test(p.title))
      .filter(p => {
        const ii = p.imageinfo[0];
        // Aspect ratio: thangkas are portrait. Reject very wide images (gallery/landscape shots).
        if (ii.width && ii.height) {
          const ratio = ii.height / ii.width;
          if (ratio < 0.85) return false; // wider than ~1:1.18 → likely not a thangka
        }
        const t = stripDiacritics(p.title);
        const hasFigure = figureWords.some(w => t.includes(w));
        const isStrongArtwork = /thangka|thanka|painting/i.test(t);
        return isStrongArtwork || hasFigure;
      });

    if (debugLines) debugLines.push('  after filter: ' + candidates.length);
    if (candidates.length === 0) return null;

    // Score each candidate on relevance + quality
    const scoreOf = (p) => {
      const t = stripDiacritics(p.title);
      const ii = p.imageinfo[0];
      let score = 0;
      // Subject match — full figure name present is strongest
      if (t.includes(cleanedNoDiacritics)) score += 5;
      // Partial: count how many figure words appear
      score += figureWords.filter(w => t.includes(w)).length * 2;
      // Artwork keywords
      if (/thangka|thanka/i.test(t)) score += 3;
      else if (/painting/i.test(t)) score += 2;
      // Aspect ratio bonus — taller is more thangka-like
      if (ii.width && ii.height) {
        const ratio = ii.height / ii.width;
        if (ratio >= 1.2) score += 3;       // classic tall thangka
        else if (ratio >= 1.0) score += 1;  // portrait-ish
      }
      // Resolution bonus — bigger files tend to be better scans
      if (ii.size > 800000) score += 2;
      else if (ii.size > 400000) score += 1;
      // Penalise obvious non-thangka clutter
      if (/logo|map|diagram|university|stamp|coin|building|temple exterior/i.test(t)) score -= 5;
      return score;
    };

    candidates.forEach(p => { p._score = scoreOf(p); });
    candidates.sort((a, b) => b._score - a._score);

    if (debugLines) {
      debugLines.push('  scored top 5:');
      candidates.slice(0, 5).forEach(p => debugLines.push('    [' + p._score + '] ' + p.title));
    }

    // Anti-repetition: drop anything shown in the last few entries
    let pool = candidates.filter(p => !recentImageTitles.includes(p.title));
    if (pool.length === 0) pool = candidates; // all recent → allow repeats rather than fail

    // Weighted pick: take the top-scoring tier (within 2 pts of the best) for variety,
    // but only among genuinely good matches.
    const topScore = pool[0]._score;
    const topTier = pool.filter(p => p._score >= topScore - 2).slice(0, 5);
    const chosen = topTier[Math.floor(Math.random() * topTier.length)];

    if (debugLines) debugLines.push('  pool: ' + topTier.length + ' (top score ' + topScore + ')');

    // Record for anti-repetition (keep last 6)
    recentImageTitles.push(chosen.title);
    if (recentImageTitles.length > 6) recentImageTitles.shift();

    let cleanTitle = chosen.title
      .replace(/^File:/, '')
      .replace(/_/g, ' ')
      .replace(/\.[a-z]+$/i, '');
    // Strip museum cataloging — accession numbers, museum names, "Anonymous", trailing dates
    cleanTitle = cleanTitle
      // "Anonymous - " or "Anonymous, " at start
      .replace(/^Anonymous\s*[-,–—]\s*/i, '')
      // Trailing camera/scan file codes like "DSC04516", "IMG 1234", "P1010234"
      .replace(/\s*[-–—]?\s*(DSC|IMG|DSCN|P|PA|DSCF)\s*\d{3,}\s*$/i, '')
      // Everything from a museum name onward → cut (handles museum mid-string + location + code tail)
      .replace(/\s*[-–—,]\s*(Art Institute of Chicago|British Museum|Penn Museum|Victoria \& Albert Museum|Sichuan Provincial Museum|Wellcome Collection|Rubin Museum|Metropolitan Museum|LACMA|Cleveland Museum)\b.*$/i, '')
      // Location tails like " - Chengdu, China" / ", Tibet, China"
      .replace(/\s*[-–—]\s*[A-Z][a-z]+,\s*(China|Tibet|India|Nepal|Bhutan|Mongolia)\s*.*$/i, '')
      // Patterns like " - 1996.85 - Art Institute of Chicago"
      .replace(/\s*[-–—]\s*\d{2,4}\.\d+[-\d]*\s*[-–—]\s*[^-–—]+$/i, '')
      // Patterns like " (AM 1931.626-5)" — accession codes in parens
      .replace(/\s*\(\s*[A-Z]{1,4}[\s.\-_]?\d[\d\.\-_]*\s*\)/g, '')
      // Wellcome catalog suffixes like " Wellcome L0015316" or " Wellcome V0018303"
      .replace(/\s*Wellcome\s+[A-Z]\d+\s*$/i, '')
      // Trailing accession codes like " - 1986.1314" or " - 1970.486"
      .replace(/\s*[-–—]\s*\d{4}\.\d+\s*$/i, '')
      // Museum names at end without a separator
      .replace(/\s+(Art Institute of Chicago|British Museum|Penn Museum|Victoria \& Albert Museum|Sichuan Provincial Museum|Wellcome Collection)\s*$/i, '')
      // Strip "Painted Banner (Thangka) of/with" → just keep what follows
      .replace(/^Painted Banner\s*\(Thangka\)\s*(of|with)?\s*/i, '')
      // Strip parenthetical epithets/aliases like "(Orgyen Dorje Chang)"
      .replace(/\s*\([^)]*\)/g, '')
      // Trim co-figure enumerations only: ", with X, Y, and Z" — must contain a comma or " and "
      // (so short meaningful clauses like "with Rainbow Body" are kept)
      .replace(/,?\s*with\s+[^-–—]*?(?:,|\sand\s)[^-–—]+?(?=\s*[-–—]\s*\d|$)/i, '')
      // "modern times" / "modern period" descriptor — drop, it adds nothing
      .replace(/,?\s*modern (times|period)\b/i, '')
      // Whitespace cleanup
      .replace(/\s+/g, ' ')
      .replace(/\s*,\s*$/g, '')
      .replace(/\s*[-–—]\s*$/g, '')
      .trim();

    return {
      url: chosen.imageinfo[0].thumburl || chosen.imageinfo[0].url,
      fullUrl: chosen.imageinfo[0].url,
      title: chosen.title,
      cleanTitle: cleanTitle
    };
  } catch (e) {
    if (debugLines) debugLines.push('  error: ' + e.message);
    console.error('Wikimedia search error:', e);
    return null;
  }
}

// ── Share card population ──
let lastShareData = null;
let lastShareImageUrl = '';
let lastShareImageTitle = '';
let lastShareCaption = '';

function populateShareCard(d) {
  lastShareData = d;
  document.getElementById('scYouWrote').textContent = lastEntryText;

  document.getElementById('scScriptSa').textContent = d.term_sanskrit || '';
  document.getElementById('scScriptSaRoman').textContent = d.term_transliteration || '';
  if (d.term_tibetan && d.term_tibetan.trim()) {
    document.getElementById('scScriptBo').textContent = d.term_tibetan;
    document.getElementById('scScriptBoRoman').textContent = d.term_tibetan_roman || '';
    document.getElementById('scTibGroup').style.display = 'block';
  } else {
    document.getElementById('scTibGroup').style.display = 'none';
  }

  // Condensed term translation for the share card (fall back to full if short missing)
  // Term definition is carried by the synthesis now; keep this populated for fallback only
  document.getElementById('scTermBody').textContent = d.term_translation_short || d.term_translation || '';
  document.getElementById('scFigureName').textContent = d.figure_name || '';
  // Figure meta line: tradition · dates (omit empties)
  const metaParts = [];
  if (d.figure_tradition && d.figure_tradition.trim()) metaParts.push(d.figure_tradition.trim());
  if (d.figure_dates && d.figure_dates.trim()) metaParts.push(d.figure_dates.trim());
  document.getElementById('scFigureMeta').textContent = metaParts.join(' · ');
  // Synthesis block — weave source + teaching + essence. *italics* → <em>. Fallback if missing.
  const synthEl = document.getElementById('scSynthesis');
  let synthRaw = (d.share_synthesis || '').trim();
  if (!synthRaw) {
    // Fallback: build from parts if the synthesis field is missing (older cached responses)
    const fig = d.figure_description_short || d.figure_description || '';
    const src = d.source_text ? ('In <em>' + d.source_text + '</em>' + (d.source_reference ? ' (' + d.source_reference + ')' : '') + ', ') : '';
    synthRaw = src + fig;
    synthEl.innerHTML = synthRaw;
  } else {
    // **term** → burnt-red term; *source title* → italic. Process ** before * to avoid collision.
    let html = synthRaw
      .replace(/\*\*([^*]+)\*\*/g, '<span class="sc-term-inline">$1</span>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>');
    synthEl.innerHTML = html;
  }

  // Verse
  const verseBlock = document.getElementById('scVerseBlock');
  const verseLines = (d.verse_text || '').split('\n').map(l => l.trim()).filter(Boolean);
  if (verseLines.length > 0) {
    document.getElementById('scVerseText').innerHTML = verseLines.join('<br>');
    let attr = d.verse_attribution || '';
    if (attr.includes('Buddha') && attr.includes('Theravada')) {
      attr = attr.replace(/[·\s]*Theravada[\s]*/g, '');
    }
    const scVerseSource = (d.verse_source || '').replace(/^\*+|\*+$/g, '').trim();
    document.getElementById('scVerseAttr').innerHTML = attr + (scVerseSource ? ' · <em>' + scVerseSource + '</em>' : '');
    verseBlock.style.display = 'block';
  } else {
    verseBlock.style.display = 'none';
  }

  // Image — populated separately when image loads
  syncShareCardImage();
}

function syncShareCardImage() {
  // Mirror current image into the share card
  const artImg = document.getElementById('artImg');
  const scImg = document.getElementById('scImg');
  const scImageBlock = document.getElementById('scImageBlock');
  if (!artImg || !scImg) return;

  if (artImg.style.display === 'none' || !artImg.src) {
    scImageBlock.style.display = 'none';
    return;
  }
  scImageBlock.style.display = 'block';
  scImg.src = artImg.src;
  document.getElementById('scImgTitle').textContent = document.getElementById('imgTitle').textContent;
  document.getElementById('scImgWhy').textContent = document.getElementById('imgWhy').textContent;
}

// Re-sync share card image whenever the page image updates
const imgObserver = new MutationObserver(() => syncShareCardImage());
window.addEventListener('DOMContentLoaded', () => {
  const artImg = document.getElementById('artImg');
  const imgWhy = document.getElementById('imgWhy');
  if (artImg) imgObserver.observe(artImg, { attributes: true, attributeFilter: ['src', 'style'] });
  if (imgWhy) imgObserver.observe(imgWhy, { childList: true, subtree: true, characterData: true });
});

function toggleIncludeEntry(checked) {
  const block = document.getElementById('scYouWroteBlock');
  if (block) block.style.display = checked ? 'block' : 'none';
}

let currentFormat = 'default';
function setFormat(format) {
  currentFormat = format;
  const card = document.getElementById('shareCard');
  card.classList.remove('format-default', 'format-square', 'format-story');
  card.classList.add('format-' + format);
  document.querySelectorAll('.format-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.format === format);
  });
}

async function preloadShareImage() {
  const img = document.getElementById('scImg');
  if (!img.src || img.src.startsWith('data:')) return;
  try {
    const r = await fetch(img.src);
    if (!r.ok) return;
    const blob = await r.blob();
    const dataUrl = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
    return new Promise((resolve) => {
      const newImg = new Image();
      newImg.onload = () => { img.src = dataUrl; setTimeout(resolve, 200); };
      newImg.onerror = () => resolve();
      newImg.src = dataUrl;
    });
  } catch (e) {
    console.warn('Image preload failed:', e);
  }
}

async function saveCard() {
  const toast = document.getElementById('toast');
  toast.textContent = 'Rendering...';
  toast.classList.add('visible');
  try {
    const container = document.getElementById('shareCardContainer');
    container.style.top = '0';
    container.style.left = '-10000px';
    await preloadShareImage();
    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, {
      backgroundColor: null, scale: 2, useCORS: true, allowTaint: false, logging: false
    });
    container.style.top = '-10000px';
    const link = document.createElement('a');
    link.download = 'dharmas-echo-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    toast.textContent = 'Saved';
    setTimeout(() => toast.classList.remove('visible'), 2000);
  } catch (e) {
    console.error('Save failed:', e);
    toast.textContent = 'Save failed';
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }
}

async function shareCard() {
  const toast = document.getElementById('toast');
  toast.textContent = 'Preparing...';
  toast.classList.add('visible');
  try {
    const container = document.getElementById('shareCardContainer');
    container.style.top = '0';
    container.style.left = '-10000px';
    await preloadShareImage();
    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, {
      backgroundColor: null, scale: 2, useCORS: true, allowTaint: false, logging: false
    });
    container.style.top = '-10000px';

    canvas.toBlob(async (blob) => {
      if (!blob) { throw new Error('Blob failed'); }
      const file = new File([blob], 'dharmas-echo.png', { type: 'image/png' });
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "Dharma's Echo", text: 'From Dharma\u2019s Echo — dharmas-echo.vercel.app' });
          toast.textContent = 'Shared';
          setTimeout(() => toast.classList.remove('visible'), 2000);
          return;
        } catch (err) {
          if (err.name === 'AbortError') { toast.classList.remove('visible'); return; }
        }
      }
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast.textContent = 'Copied to clipboard';
        setTimeout(() => toast.classList.remove('visible'), 2500);
      } catch (err) {
        const link = document.createElement('a');
        link.download = 'dharmas-echo-' + Date.now() + '.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        toast.textContent = 'Downloaded';
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
    }, 'image/png');
  } catch (e) {
    console.error('Share failed:', e);
    toast.textContent = 'Share failed';
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }
}

function reset() {
  document.getElementById('entry').value = '';
  document.getElementById('response').classList.remove('visible');
  document.getElementById('againRow').classList.remove('visible');
  const saveRowReset = document.getElementById('saveRow');
  if (saveRowReset) saveRowReset.classList.remove('visible');
  // Reset include-entry toggle
  const toggleReset = document.getElementById('includeEntryToggle');
  if (toggleReset) toggleReset.checked = false;
  const youWroteBlockReset = document.getElementById('scYouWroteBlock');
  if (youWroteBlockReset) youWroteBlockReset.style.display = 'none';
  // Un-hide image block + dividers in case they were hidden last response
  const imgBlock = document.querySelector('.image-block');
  if (imgBlock) imgBlock.style.display = '';
  document.querySelectorAll('.divider').forEach(d => d.style.display = '');
  document.getElementById('echoBtn').disabled = false;
  document.querySelector('.write-area').style.display = '';
  document.querySelector('.echo-row').style.display = '';
  const hint = document.getElementById('writeHint');
  if (hint) hint.classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Hide hint when typing begins, restore when empty
document.addEventListener('DOMContentLoaded', function() {
  const entry = document.getElementById('entry');
  const hint = document.getElementById('writeHint');
  if (entry && hint) {
    entry.addEventListener('input', function() {
      if (entry.value.length > 0) {
        hint.classList.add('hidden');
      } else {
        hint.classList.remove('hidden');
      }
    });
  }
});
