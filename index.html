<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dharma's Echo</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Serif+Devanagari:wght@300;400;500&family=Jomolhari&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --cream: #f8f0d8;
  --cream-border: #d8c080;
  --gold: #c8a030;
  --gold-dark: #a08030;
  --amber: #b06818;
  --text: #2a2010;
  --text-mid: #4a3a18;
  --text-label: #6a5820;
  --text-faint: #c8a855;
}

body {
  background: #ffffff;
  font-family: 'Lora', Georgia, serif;
  color: var(--text);
  max-width: 680px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 5rem;
}

/* ── Header ── */
.header {
  padding: 2.4rem 3rem 1.8rem;
  border-bottom: 1px solid var(--cream-border);
}
.header-name {
  font-family: sans-serif;
  font-size: 0.95rem;
  letter-spacing: 0.42em;
  font-weight: 300;
  color: var(--text);
}
.header-sub {
  font-family: sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 0.5rem;
}

/* ── Key gate ── */
.key-gate {
  padding: 0.9rem 3rem;
  border-bottom: 1px solid var(--cream-border);
  background: var(--cream);
  display: flex;
  align-items: center;
  gap: 0.8rem;
}
.key-gate.hidden { display: none; }
.key-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold-dark);
  white-space: nowrap;
  font-weight: 600;
}
.key-input {
  flex: 1;
  border: none;
  border-bottom: 1px solid var(--cream-border);
  padding: 0.35rem 0.5rem;
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--text);
  outline: none;
  background: transparent;
  min-width: 0;
}
.key-save {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
}
.key-save:hover { color: var(--text); }

/* ── Write area ── */
.write-area { padding: 3rem 3rem 0; }
textarea {
  width: 100%;
  min-height: 80px;
  border: none;
  outline: none;
  resize: none;
  font-family: 'Lora', Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.9;
  color: var(--text);
  background: transparent;
  display: block;
}
textarea::placeholder { color: var(--text-faint); font-style: italic; font-size: 1.05rem; }
.write-hint {
  font-family: sans-serif;
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-top: 0.5rem;
  transition: opacity 0.3s;
}
.write-hint.hidden { opacity: 0; }

.echo-row {
  display: flex;
  justify-content: flex-end;
  padding: 1rem 3rem 2.5rem;
}
.echo-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0.3rem 0;
  transition: color 0.2s;
}
.echo-btn:hover { color: var(--text); }
.echo-btn:disabled { color: var(--text-faint); cursor: not-allowed; }

/* ── Loading ── */
.loading { display: none; padding: 2.5rem 3rem; }
.loading.visible { display: block; }
.loading-text {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── Response ── */
.response { display: none; animation: fadeIn 0.7s ease; }
.response.visible { display: block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

/* You wrote */
.you-wrote {
  padding: 2.8rem 3rem 2.4rem;
  border-bottom: 1px solid var(--amber);
  margin-bottom: 2.8rem;
}
.you-wrote-label {
  font-family: sans-serif;
  font-size: 0.56rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.9rem;
}
.you-wrote-text {
  font-size: 1.05rem;
  font-style: italic;
  color: var(--gold);
  line-height: 1.9;
}

/* Response body */
.response-body { padding: 0 3rem; }

/* Opening */
.opening {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text);
  margin-bottom: 2.4rem;
}

/* Term block */
.term-block {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--gold);
  padding: 1.8rem 2rem;
  margin-bottom: 2.4rem;
}
.term-scripts {
  display: flex;
  gap: 2rem;
  align-items: baseline;
  margin-bottom: 0.6rem;
  flex-wrap: wrap;
}
.term-script {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.3;
}
.term-script-tibetan {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.3rem;
  font-weight: 300;
  color: var(--gold-dark);
  line-height: 1.4;
}
.term-roman {
  font-family: sans-serif;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 1.1rem;
  font-weight: 600;
}
.term-first {
  font-size: 0.97rem;
  line-height: 1.85;
  color: var(--text);
  font-weight: 600;
  margin-bottom: 0.5rem;
}
.term-body {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
}

/* Seal line */
.seal-line {
  font-family: 'Lora', Georgia, serif;
  font-size: 0.97rem;
  line-height: 1.8;
  color: var(--text-label);
  margin-bottom: 2.8rem;
  font-style: italic;
}

/* Section divider — amber line */
.section-rule {
  border: none;
  border-top: 1px solid var(--amber);
  margin: 0 0 2.4rem;
  opacity: 0.5;
}

/* Figure + Source */
.figure-source { margin-bottom: 2.4rem; }

.figure-name {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.25rem;
}
.figure-tradition {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.7rem;
}
.figure-key-work {
  font-family: sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.6rem;
}
.figure-key-work em {
  font-style: italic;
  text-transform: none;
  letter-spacing: 0;
  font-size: 0.75rem;
}
.figure-desc {
  font-size: 0.97rem;
  line-height: 1.9;
  color: var(--text-mid);
  margin-bottom: 1.6rem;
}
.source-title {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  color: var(--gold-dark);
  margin-bottom: 0.7rem;
}
.source-title em {
  font-style: italic;
  font-family: 'Lora', Georgia, serif;
  letter-spacing: 0.02em;
  font-size: 0.78rem;
}
.source-title .source-ref-upper {
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-size: 0.62rem;
}
.source-box {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  border-left: 3px solid var(--amber);
  padding: 1.2rem 1.6rem;
}
.source-passage {
  font-size: 0.97rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.9;
  margin-bottom: 0.55rem;
}
.source-translator {
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-label);
}

/* Divider star */
.divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 2.4rem 0;
}
.divider-line { flex:1; height:1px; background: var(--amber); opacity: 0.4; }

/* Image */
.image-block {
  background: var(--cream);
  border: 1px solid var(--cream-border);
  padding: 1.8rem;
  margin-bottom: 2.4rem;
  text-align: center;
}
.image-block img {
  max-width: 100%;
  max-height: 300px;
  object-fit: contain;
  display: block;
  margin: 0 auto 1.1rem;
}
.image-title {
  font-family: sans-serif;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 0.45rem;
}
.image-why {
  font-size: 0.9rem;
  color: var(--text-label);
  line-height: 1.75;
}

/* Verse */
.verse-block { margin-bottom: 1rem; }
.verse-label {
  font-family: sans-serif;
  font-size: 0.66rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  margin-bottom: 1rem;
}
.verse-text {
  font-family: 'Lora', Georgia, serif;
  font-size: 1rem;
  font-weight: 400;
  color: var(--text);
  line-height: 2.1;
  margin-bottom: 0.8rem;
}
.verse-attr {
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold-dark);
}

/* Again */
.again-row { padding: 2rem 3rem 0; display: none; }
.again-row.visible { display: flex; }
.again-btn {
  background: none;
  border: none;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  cursor: pointer;
  padding: 0;
}
.again-btn:hover { color: var(--text); }

/* Error */
.error { display: none; padding: 1rem 3rem; color: #904040; font-style: italic; font-size: 0.9rem; }
.error.visible { display: block; }

/* ── Save as card button ── */
.save-row {
  padding: 1rem 3rem 0;
  display: none;
  justify-content: flex-start;
  gap: 1rem;
}
.save-row.visible { display: flex; }
.save-btn {
  background: none;
  border: 1px solid var(--cream-border);
  padding: 0.5rem 1.2rem;
  font-family: sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold-dark);
  cursor: pointer;
  transition: all 0.2s;
}
.save-btn:hover { background: var(--cream); color: var(--text); }

/* ── Share card (off-screen for rendering) ── */
.share-card-container {
  position: fixed;
  top: -10000px;
  left: 0;
  width: 560px;
  pointer-events: none;
  z-index: -1;
}
.share-card {
  width: 560px;
  padding: 2.2rem;
  font-family: 'EB Garamond', Georgia, serif;
  color: #1a2540;
  background: radial-gradient(ellipse at 50% 50%, #fdf5de 0%, #f0e6c0 40%, #9aa8be 90%, #6a7e9a 100%);
  box-shadow: inset 0 0 60px rgba(40, 55, 95, 0.14);
  border-radius: 4px;
}
.sc-header { text-align: center; padding-bottom: 1.2rem; border-bottom: 1px solid rgba(110, 130, 170, 0.4); }
.sc-header-name {
  font-family: sans-serif;
  font-size: 11px;
  letter-spacing: 0.38em;
  color: #a82010;
  font-weight: 600;
  margin-bottom: 0.4rem;
}
.sc-header-sub {
  font-family: sans-serif;
  font-size: 8.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #c85810;
}
.sc-you-wrote { padding: 1rem 0; border-bottom: 1px solid rgba(110, 130, 170, 0.35); }
.sc-label {
  font-family: sans-serif;
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #c85810;
  margin-bottom: 0.35rem;
  font-weight: 700;
}
.sc-you-wrote-text {
  font-size: 13px;
  font-style: italic;
  color: #2a3555;
  line-height: 1.55;
}
.sc-opening {
  padding: 1.2rem 0;
  font-size: 14.5px;
  line-height: 1.75;
  color: #1a2540;
  border-bottom: 1px solid rgba(110, 130, 170, 0.35);
}
.sc-term-block { padding: 1.4rem 0 1.2rem; }
.sc-term-scripts {
  display: flex;
  gap: 2.5rem;
  align-items: flex-start;
  margin-bottom: 1.1rem;
  flex-wrap: wrap;
}
.sc-script-sa {
  font-family: 'Noto Serif Devanagari', Georgia, serif;
  font-size: 24px;
  color: #1a2540;
  line-height: 1.2;
}
.sc-script-bo {
  font-family: 'Jomolhari', Georgia, serif;
  font-size: 21px;
  color: #1a2540;
  line-height: 1.3;
}
.sc-script-roman {
  font-family: 'EB Garamond', serif;
  font-size: 14px;
  font-style: italic;
  color: #c85810;
  letter-spacing: 0.02em;
  margin-top: 0.15rem;
}
.sc-term-first {
  font-size: 14px;
  color: #1a2540;
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 0.5rem;
}
.sc-term-body {
  font-size: 13px;
  color: #3a4565;
  line-height: 1.8;
}
.sc-seal {
  padding: 0.9rem 0;
  font-size: 13px;
  font-style: italic;
  color: #3a4565;
  line-height: 1.75;
  border-top: 1px solid rgba(110, 130, 170, 0.35);
  border-bottom: 1px solid rgba(110, 130, 170, 0.35);
}
.sc-figure-source { padding: 1.2rem 0 1.4rem; }
.sc-figure-name {
  font-size: 15px;
  color: #1a2540;
  font-weight: 500;
  margin-bottom: 0.6rem;
}
.sc-source-ref {
  font-family: sans-serif;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: #a82010;
  margin-bottom: 0.6rem;
  font-weight: 700;
}
.sc-source-ref em {
  font-family: 'EB Garamond', serif;
  text-transform: none;
  letter-spacing: 0.02em;
  font-size: 13px;
  font-style: italic;
}
.sc-source-box {
  background: rgba(253, 240, 205, 0.5);
  padding: 0.9rem 1.1rem;
  border-left: 2px solid #a82010;
  border-radius: 2px;
}
.sc-source-passage {
  font-size: 13px;
  font-style: italic;
  color: #1a2540;
  line-height: 1.75;
  margin-bottom: 0.4rem;
}
.sc-source-trans {
  font-family: sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #3a4565;
}
.sc-gloss {
  padding: 0.7rem 0.3rem 0;
  font-size: 11.5px;
  font-style: italic;
  color: #5a6580;
  line-height: 1.7;
}
.sc-image-block {
  background: rgba(253, 240, 205, 0.4);
  padding: 1rem;
  margin: 0.5rem 0 1.2rem;
  text-align: center;
  border-radius: 2px;
}
.sc-image-block img {
  max-width: 100%;
  max-height: 340px;
  object-fit: contain;
  display: block;
  margin: 0 auto 0.9rem;
}
.sc-image-title {
  font-family: sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #a82010;
  font-weight: 700;
  margin-bottom: 0.5rem;
}
.sc-image-why {
  font-size: 12.5px;
  color: #3a4565;
  font-style: italic;
  line-height: 1.7;
}
.sc-footer {
  text-align: center;
  padding-top: 1.2rem;
  border-top: 1px solid rgba(110, 130, 170, 0.35);
  font-family: sans-serif;
  font-size: 9px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: #c85810;
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #f0e6c8;
  padding: 0.7rem 1.4rem;
  font-family: sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border-radius: 2px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 1000;
}
.toast.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-name">DHARMA'S ECHO</div>
  <div class="header-sub">the dharma echoes back what was always already there</div>
</div>

<div class="key-gate" id="keyGate">
  <div class="key-label">API Key</div>
  <input class="key-input" id="keyInput" type="password" placeholder="sk-ant-..." />
  <button class="key-save" onclick="saveKey()">Save ›</button>
</div>

<div class="write-area">
  <textarea id="entry" placeholder="write"></textarea>
  <div class="write-hint" id="writeHint">the dharma will find the echo</div>
</div>
<div class="echo-row">
  <button class="echo-btn" id="echoBtn" onclick="submitEntry()">Echo ›</button>
</div>

<div class="loading" id="loading"><div class="loading-text">Listening...</div></div>
<div class="error" id="error">Something did not land. Please try again.</div>

<div class="response" id="response">

  <div class="you-wrote">
    <div class="you-wrote-label">You wrote</div>
    <div class="you-wrote-text" id="youWroteText"></div>
  </div>

  <div class="response-body">

    <div class="opening" id="opening"></div>

    <div class="term-block">
      <div class="term-scripts">
        <div class="term-script" id="termSanskrit"></div>
        <div class="term-script-tibetan" id="termTibetan"></div>
      </div>
      <div class="term-roman" id="termRoman"></div>
      <div class="term-first" id="termFirst"></div>
      <div class="term-body" id="termBody"></div>
    </div>

    <div class="seal-line" id="sealLine"></div>

    <hr class="section-rule">

    <div class="figure-source">
      <div class="figure-name" id="figureName"></div>
      <div class="figure-tradition" id="figureTradition"></div>
      <div class="figure-key-work" id="figureKeyWork"></div>
      <div class="figure-desc" id="figureDesc"></div>
      <div class="source-title" id="sourceTitle"></div>
      <div class="source-box">
        <div class="source-passage" id="sourcePassage"></div>
        <div class="source-translator" id="sourceTranslator"></div>
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <svg width="8" height="8" viewBox="0 0 10 10"><polygon points="5,0 6.2,3.8 10,5 6.2,6.2 5,10 3.8,6.2 0,5 3.8,3.8" fill="#b06818" opacity="0.7"/></svg>
      <div class="divider-line"></div>
    </div>

    <div class="image-block">
      <img id="artImg" src="" alt="" style="display:none;" onerror="this.style.display='none'">
      <div class="image-title" id="imgTitle"></div>
      <div class="image-why" id="imgWhy"></div>
    </div>

    <div class="verse-block">
      <div class="verse-label">A verse</div>
      <div class="verse-text" id="verseText"></div>
      <div class="verse-attr" id="verseAttr"></div>
    </div>

  </div>
</div>

<div class="again-row" id="againRow">
  <button class="again-btn" onclick="reset()">Write another entry ›</button>
</div>

<script>
const IMAGES = [
  { url:"https://upload.wikimedia.org/wikipedia/commons/1/12/Milarepa_thangka.JPG", title:"Milarepa", artist:"Tibetan, 17th century", tradition:"Kagyu, Tibetan Buddhist", tags:["milarepa","practice","renunciation","liberation","impermanence","anicca","mahamudra","solitude","mountain","cave","kagyu"] },
  { url:"https://upload.wikimedia.org/wikipedia/commons/f/f2/Milarepa_%281040-1123%29_LACMA_M.82.165.2.jpg", title:"Milarepa, LACMA", artist:"Tibetan, 15th–16th century", tradition:"Kagyu, Tibetan Buddhist", tags:["milarepa","practice","kagyu","mountain","songs","mahamudra"] },

function selectImage(keywords) {
  const terms = (keywords || '').toLowerCase();
  let best = IMAGES[Math.floor(Math.random() * IMAGES.length)];
  let bestScore = 0;
  for (const img of IMAGES) {
    let score = 0;
    for (const tag of img.tags) { if (terms.includes(tag)) score++; }
    if (score > bestScore) { bestScore = score; best = img; }
  }
  return best;
}

const SYSTEM_PROMPT = `You are the philosophical heart of Dharma's Echo. You do not interpret, counsel, or affirm. You receive what has been written and find where in the Buddhist tradition — across all schools, centuries, and languages — that territory has been named with the greatest precision. Then the tradition speaks. You do not.

THE OPENING LINE — three possible modes, choose the most precise:

Mode 1 — a figure is directly connected to the entry's territory:
Name the figure directly. "Milarepa sang about this." "Nagarjuna spent his life on this question." "The Buddha addressed this in his first teaching." One sentence only. The figure's name comes first. Never start with "He" or "She."

Mode 2 — a specific sutra or text is the most direct source:
Name the actual text, not the category. Italicize the text title. "The *Dhammacakkappavattana Sutta* names what is present here." "This is the territory of Nagarjuna's *Mulamadhyamakakarika*." Never say "Pali sutras" as a category — name the specific sutta.

Mode 3 — a word from the entry is the clearest hook:
Echo one word or phrase from the entry, then step aside. "'Liberation' — the tradition has a precise word for what that points to." Only use this mode if a word from the entry is genuinely the sharpest entry point.

Never interpret what the person felt or experienced. Never affirm, summarize, or bridge. The opening is a door — it opens directly onto the tradition.

THE TERM — the single most precise concept. Not the broadest — the most exact.

term_sanskrit: The term in Sanskrit Devanagari script if the concept has Sanskrit form. If Pali only, use Pali romanized. Never invent a script rendering.
term_tibetan: The term in Tibetan script ONLY if you are certain it exists in the Tibetan tradition under that name with equivalent or closely related meaning. If uncertain, leave empty. If you include the Tibetan, you must also include its Wylie transliteration in term_tibetan_roman. Accuracy over completeness.
term_tibetan_roman: Wylie transliteration of the Tibetan term if term_tibetan is provided — else empty string.
term_transliteration: Full romanized form of the PRIMARY term (Sanskrit or Pali) with diacritics.
term_tradition: Pali / Sanskrit / Tibetan / Sanskrit and Tibetan — only list traditions where the term genuinely exists with that meaning.
term_first_line: One sentence. Not the flat English word — the hook that opens the real meaning.
term_translation: Two parts. First: one sentence of philosophical precision — what the tradition actually means by this term, where it appears, what it identifies or names. No metaphor yet. Second: one short poetic line that earns its place — beginning with "Like" — a simile that illuminates the concept without interpreting the entry. In the spirit of Thrinley Norbu Rinpoche's writing: direct, simple, the image lands without explanation. The simile serves the term, not the person who wrote. Example: "Tṛṣṇā is the craving identified in the second noble truth as the origin of dukkha — the compulsive grasping that perpetuates the cycle of becoming. Like consciousness projecting a distant shore while standing on solid ground." If the Tibetan term carries a meaningfully different nuance, one additional sentence may note this.

THE SEAL — conversational, one sentence, in italic register:

If the entry genuinely meets a seal:
"Your entry meets the [first/second/third/fourth] seal — [seal name]. [One-line statement of what that seal actually teaches.]"

If the entry moves against the dharma or points away from a seal:
State the relevant seal clearly and let it speak for itself. "The first seal — anicca — teaches that all compounded things are impermanent." Do not correct the person. The seal is a compass, not a judgment.

THE FIGURE — always named. Strict source hierarchy:
1. The Buddha directly, from the Pali suttas or early Mahayana sutras
2. Early Indian masters: Nagarjuna, Chandrakirti, Aryadeva, Vasubandhu, Asanga, Shantideva, Atisha
3. Among Tibetan schools, follow this order of preference unless a lower school holds the concept more precisely:
   — Nyingma first and strongly preferred: Longchenpa, Jigme Lingpa, Patrul Rinpoche, Mipham Rinpoche, Chogyur Lingpa, Dudjom Rinpoche, Yeshe Tsogyal.
     · Longchenpa (1308–1364): the master of Dzogchen, the Seven Treasuries, the vast expanse of mind. For natural state, rigpa, emptiness, the ground of being, the nature of phenomena, primordial purity — Longchenpa is almost always the most precise Tibetan voice.
     · Patrul Rinpoche: Words of My Perfect Teacher — for foundational teachings, bodhicitta, the preliminary practices, the ordinary mind that is buddha nature.
     · Jigme Lingpa: for the Heart Essence of the Vast Expanse (Longchen Nyingthig), terma, the nature of mind.
     · Mipham Rinpoche: for philosophical precision across traditions, especially where Madhyamaka meets Dzogchen.
     · Dudjom Rinpoche: for tantric view, the nature of perception, the purity of phenomena.
     · Chogyur Lingpa: for terma and Rimé territory.
     · Yeshe Tsogyal: for the feminine principle, the dakini, the ground of experience.
   — Sakya second: Sakya Pandita, Gorampa — for precise philosophical and Lamdre territory
   — Kagyu third — ONLY when the concept is specifically and precisely Mahamudra territory, or the entry is unmistakably in the Kagyu stream (mountain solitude, the dohas, the songs of realization). Do not default to Milarepa. Milarepa is one figure among many — reach for Longchenpa, Patrul Rinpoche, or Jigme Lingpa first unless the Kagyu match is exact.
     · Milarepa: his domain is the songs (Mila Grubum), mountain retreat, the direct path through hardship, Mahamudra realization through practice. Not a default.
     · Marpa, Gampopa, Tilopa, Naropa, Machig Labdrön, Niguma: each has a specific domain.
   — Gelug: Tsongkhapa — when Madhyamaka philosophical precision specifically requires it
4. Later masters: Thrinley Norbu Rinpoche (elements and elemental mind), Dilgo Khyentse Rinpoche, Dzongsar Khyentse Rinpoche
5. Contemporary teachers only when nothing above fits more precisely

The figure's name always comes first in the description. Never start with "He" or "She."
One sentence only. What they refused, showed, or opened. Never biographical.

For figure_key_verb use the most precise relationship:
- "author of" — for writers of treatises and commentaries (Longchenpa, Nagarjuna, Shantideva, Patrul Rinpoche)
- "singer of" — for Milarepa and his songs
- "revealer of" — for tertöns who revealed terma (Chogyur Lingpa, Jigme Lingpa)
- "translator of" — for Marpa, whose primary role was transmission
- Leave empty for figures with no primary authored text (Tilopa, Naropa) and always for Buddha Śākyamuni

For Buddha Śākyamuni: figure_tradition, figure_dates, figure_key_verb, and figure_key_work must all be empty strings. The name alone carries everything.

THE SOURCE — strict hierarchy:
1. Pali Canon suttas — always named specifically with both the Pali name and the MN/SN/DN/AN number. E.g. "Cūḷamālunkya Sutta · MN 63" or "Dhammacakkappavattana Sutta · SN 56.11". Never just "Pali Canon" — name the specific sutta.
2. Early Mahayana sutras — Heart Sutra, Diamond Sutra, Vimalakirti Nirdesha, Lankavatara — with chapter where possible
3. Shastras — Nagarjuna's Mulamadhyamakakarika (with chapter and verse), Shantideva's Bodhicharyavatara (chapter and verse), Vasubandhu's Abhidharmakosa
4. Tibetan treasuries — Longchenpa's Precious Treasury of the Dharmadhatu, Patrul Rinpoche's Words of My Perfect Teacher (chapter), Milarepa's Hundred Thousand Songs (song name/number)
5. Other texts only if more precise than the above

Passage: under 40 words, verified and precise. From Pali Canon, use Bhikkhu Bodhi or Bhikkhu Sujato translation and name them. From copyrighted translations (Padmakara, Shambhala, others), paraphrase carefully and name translator, publisher, chapter. For the translator credit always prefix with "Trans." Never invent a quote. If uncertain about the exact passage, choose one you are certain of rather than approximating.

THE IMAGE — one sentence about the quality this territory shares with art from this tradition. Do not reference a specific image by name.

THE VERSE — real verified verse only. Never invented. Lines separated by \\n. Not italic.

TONE: Warm, precise, learned. Never therapeutic, never wellness, never academic performance.
Forbidden: invites us to, reminds us, journey, healing, transform, sit with, hold space, unpack, explore, process, navigate, tapestry, landscape, resonate, profound.
Never use nationality words for figures. Never biography — only what they saw or showed.

Return ONLY valid JSON, no markdown, no backticks, no preamble:
{
  "opening": "One sentence. Door opens directly onto tradition. Never interpretive.",
  "term_sanskrit": "Sanskrit Devanagari or Pali romanized",
  "term_tibetan": "Tibetan script only if identical concept exists — else empty string",

  "figure_key_verb": "The precise relationship verb — 'author of', 'singer of', 'revealer of', 'translator of'. Empty string if the figure is Buddha Śākyamuni or had no primary text.",
  "figure_key_work": "The single most important text in italics — just the title, no verb. Empty string if the figure is Buddha Śākyamuni or had no primary authored text.",

  "source_reference": "Sutta ID, chapter, verse, or song number",

async function submitEntry() {
  if (!API_KEY) { alert('Please enter your Anthropic API key first.'); return; }
  const entry = document.getElementById('entry').value.trim();
  if (!entry) return;
  lastEntryText = entry;

  const btn = document.getElementById('echoBtn');
  btn.disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('response').classList.remove('visible');
  document.getElementById('error').classList.remove('visible');
  document.getElementById('againRow').classList.remove('visible');
  document.getElementById('youWroteText').textContent = entry;
  document.querySelector('.write-area').style.display = 'none';
  document.querySelector('.echo-row').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1400,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: `Journal entry: "${entry}"` }]
      })
    });

    const data = await res.json();
    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const d = JSON.parse(clean);
    render(d);

  } catch(e) {
    console.error(e);
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('error').classList.add('visible');
    btn.disabled = false;
    document.querySelector('.write-area').style.display = '';
    document.querySelector('.echo-row').style.display = '';
  }
}

function render(d) {
  document.getElementById('loading').classList.remove('visible');
  lastResponseData = d;

  // Render opening — italicize text titles wrapped in *...*
  const openingEl = document.getElementById('opening');
  const openingRaw = d.opening || '';
  openingEl.innerHTML = openingRaw.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  document.getElementById('termSanskrit').textContent = d.term_sanskrit || '';
  const tibEl = document.getElementById('termTibetan');
  if (d.term_tibetan && d.term_tibetan.trim()) {
    tibEl.textContent = d.term_tibetan;
    tibEl.style.display = '';
  } else {
    tibEl.style.display = 'none';
  }
  // Build romanized line: primary term · tradition, plus Tibetan Wylie if present
  let romanLine = (d.term_transliteration || '') + ' · ' + (d.term_tradition || '');
  if (d.term_tibetan_roman && d.term_tibetan_roman.trim()) {
    romanLine += ' · ' + d.term_tibetan_roman + ' (Tibetan)';
  }
  document.getElementById('termRoman').textContent = romanLine;
  document.getElementById('termFirst').textContent = d.term_first_line || '';
  document.getElementById('termBody').textContent = d.term_translation || '';

  document.getElementById('sealLine').textContent = d.seal || '';

  document.getElementById('figureName').textContent = d.figure_name || '';

  // Build single tradition line: Tradition · Dates · verb of *Work*
  const tradEl = document.getElementById('figureTradition');
  let tradHTML = '';
  let tradParts = [];
  if (d.figure_tradition) tradParts.push(d.figure_tradition);
  if (d.figure_dates) tradParts.push(d.figure_dates);
  tradHTML = tradParts.join(' · ');
  if (d.figure_key_verb && d.figure_key_work) {
    tradHTML += ' · ' + d.figure_key_verb + ' <em>' + d.figure_key_work + '</em>';
  }
  tradEl.innerHTML = tradHTML;

  // Hide separate key work element — now folded into tradition line
  const keyEl = document.getElementById('figureKeyWork');
  if (keyEl) keyEl.style.display = 'none';

  document.getElementById('figureDesc').textContent = d.figure_description || '';

  // Source title: italic Pali/Sanskrit name, then reference in uppercase
  const sourceTitleEl = document.getElementById('sourceTitle');
  if (d.source_text) {
    let titleHTML = '<em>' + d.source_text + '</em>';
    if (d.source_reference) {
      titleHTML += ' <span class="source-ref-upper">· ' + d.source_reference + '</span>';
    }
    sourceTitleEl.innerHTML = titleHTML;
  } else {
    sourceTitleEl.textContent = '';
  }
  document.getElementById('sourcePassage').textContent = '\u201C' + (d.source_passage || '') + '\u201D';
  document.getElementById('sourceTranslator').textContent = d.source_translation || '';

  const img = selectImage(d.concept_keywords || '');
  lastImageUrl = 'https://images.weserv.nl/?url=' + encodeURIComponent(img.url.replace(/^https?:\/\//, ''));
  lastImageTitle = img.title;
  lastImageArtist = img.artist;
  lastImageTradition = img.tradition;
  const artEl = document.getElementById('artImg');
  artEl.src = img.url;
  artEl.alt = img.title;
  artEl.style.display = 'block';
  artEl.onerror = function() { this.style.display = 'none'; };
  document.getElementById('imgTitle').textContent =
    img.title + ' · ' + img.artist + ' · ' + img.tradition;
  document.getElementById('imgWhy').textContent = d.artwork_why || '';

  const lines = (d.verse_text || '').split('\n').map(l => l.trim()).filter(Boolean);
  document.getElementById('verseText').innerHTML = lines.join('<br>');
  // Verse attribution — strip tradition from Buddha Śākyamuni
  let verseAttr = d.verse_attribution || '';
  if (verseAttr.includes('Buddha') && verseAttr.includes('Theravada')) {
    verseAttr = verseAttr.replace(/[·\s]*Theravada[\s]*/g, '');
  }
  document.getElementById('verseAttr').textContent =
    verseAttr + (d.verse_source ? ' · ' + d.verse_source : '');

  document.getElementById('response').classList.add('visible');
  document.getElementById('againRow').classList.add('visible');
  document.getElementById('saveRow').classList.add('visible');
  populateShareCard();
  document.getElementById('response').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function reset() {

  document.getElementById('response').classList.remove('visible');

  document.getElementById('echoBtn').disabled = false;
  document.querySelector('.write-area').style.display = '';
  document.querySelector('.echo-row').style.display = '';
  const hint = document.getElementById('writeHint');
  if (hint) hint.classList.remove('hidden');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function saveCard() {
  const toast = document.getElementById('toast');
  toast.textContent = 'Rendering...';
  toast.classList.add('visible');

  try {
    const container = document.getElementById('shareCardContainer');
    container.style.top = '0';
    container.style.left = '-10000px';

    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: false,
      logging: false
    });

    container.style.top = '-10000px';

    const link = document.createElement('a');
    link.download = 'dharmas-echo-' + Date.now() + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

    toast.textContent = 'Saved';
    setTimeout(() => toast.classList.remove('visible'), 2000);
  } catch (e) {
    console.error('Save failed:', e);
    toast.textContent = 'Save failed';
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }
}

async function shareCard() {
  const toast = document.getElementById('toast');
  toast.textContent = 'Preparing...';
  toast.classList.add('visible');

  try {
    const container = document.getElementById('shareCardContainer');
    container.style.top = '0';
    container.style.left = '-10000px';

    const card = document.getElementById('shareCard');
    const canvas = await html2canvas(card, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: false,
      logging: false
    });

    container.style.top = '-10000px';

    // Convert canvas to blob
    canvas.toBlob(async (blob) => {
      if (!blob) { throw new Error('Blob failed'); }
      const file = new File([blob], 'dharmas-echo.png', { type: 'image/png' });

      // Try Web Share API (mobile/modern browsers)
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: "Dharma's Echo",
            text: 'From Dharma\u0027s Echo — dharmas-echo.vercel.app'
          });
          toast.textContent = 'Shared';
          setTimeout(() => toast.classList.remove('visible'), 2000);
          return;
        } catch (err) {
          if (err.name === 'AbortError') {
            toast.classList.remove('visible');
            return;
          }
        }
      }

      // Fallback — copy to clipboard
      try {
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        toast.textContent = 'Copied to clipboard';
        setTimeout(() => toast.classList.remove('visible'), 2500);
      } catch (err) {
        // Final fallback — download
        const link = document.createElement('a');
        link.download = 'dharmas-echo-' + Date.now() + '.png';
        link.href = URL.createObjectURL(blob);
        link.click();
        toast.textContent = 'Downloaded';
        setTimeout(() => toast.classList.remove('visible'), 2000);
      }
    }, 'image/png');
  } catch (e) {
    console.error('Share failed:', e);
    toast.textContent = 'Share failed';
    setTimeout(() => toast.classList.remove('visible'), 2500);
  }
}
</script>
